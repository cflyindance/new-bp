<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下单限制</title>
  <link rel="stylesheet" href="assets/common.css" />
  <style>
    :root {
      --ol-bg: #f5f7fa;
      --ol-card: #fff;
      --ol-border: #e5e7eb;
      --ol-fg: #111827;
      --ol-muted: #6b7280;
      --ol-primary: #1677ff;
      --ol-primary-soft: #e8f3ff;
      --ol-danger: #dc2626;
      --ol-danger-soft: #fee2e2;
      --ol-success: #16a34a;
      --ol-success-soft: #dcfce7;
      --ol-radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ol-fg);
      background: var(--ol-bg);
    }
    .page {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card {
      background: var(--ol-card);
      border: 1px solid var(--ol-border);
      border-radius: var(--ol-radius);
      box-shadow: 0 2px 12px rgba(15, 23, 42, .04);
    }
    .header-card {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
    }
    .header-title h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .header-title p { margin: 3px 0 0; font-size: 12px; color: var(--ol-muted); }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn {
      border: 1px solid var(--ol-border);
      background: #fff;
      color: var(--ol-fg);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.2;
      cursor: pointer;
      transition: .15s;
    }
    .btn:hover { border-color: #c7ced9; background: #f8fafc; }
    .btn-primary { background: var(--ol-primary); color: #fff; border-color: var(--ol-primary); }
    .btn-primary:hover { background: #0f69df; border-color: #0f69df; }
    .btn-danger { color: var(--ol-danger); border-color: #fecaca; background: #fff5f5; }
    .btn-danger:hover { background: #fee2e2; }
    .pill {
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
    }
    .pill.active { background: var(--ol-primary-soft); border-color: #b9d8ff; color: #0d61cb; }
    .section-card { overflow: hidden; }
    .section-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--ol-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-head h2 { margin: 0; font-size: 15px; font-weight: 600; }
    .section-body { padding: 12px 16px 16px; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      border: 1px solid transparent;
    }
    .badge.primary { background: var(--ol-primary-soft); color: #0d61cb; border-color: #b9d8ff; }
    .badge.ok { background: var(--ol-success-soft); color: #166534; border-color: #bbf7d0; }
    .badge.off { background: var(--ol-danger-soft); color: #991b1b; border-color: #fecaca; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #eef2f7;
      text-align: left;
      vertical-align: top;
    }
    th { font-size: 12px; color: var(--ol-muted); font-weight: 500; background: #fafcff; }
    td .sub { margin-top: 4px; font-size: 12px; color: var(--ol-muted); max-width: 240px; }
    .op-row { display: flex; flex-wrap: wrap; gap: 6px; }

    .sim-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
      gap: 12px;
    }
    .sim-config {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .field { display: grid; gap: 4px; }
    .field label { font-size: 13px; color: var(--ol-muted); }
    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--ol-border);
      border-radius: 10px;
      background: #fff;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.3;
      outline: none;
    }
    .textarea { min-height: 80px; resize: vertical; }
    .input:focus, .select:focus, .textarea:focus { border-color: #9cc8ff; box-shadow: 0 0 0 3px #e8f3ff; }
    .hint-bar {
      margin-bottom: 12px;
      border: 1px solid #f7dcb0;
      background: #fff9ee;
      color: #8a5b16;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      display: none;
    }
    .cat-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .cat-pill {
      border: 1px solid var(--ol-border);
      background: #fff;
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 12px;
      cursor: pointer;
    }
    .cat-pill.active { background: var(--ol-primary); border-color: var(--ol-primary); color: #fff; }
    .dish-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      max-height: 560px;
      overflow: auto;
      padding-right: 2px;
    }
    .dish-card {
      border: 1px solid var(--ol-border);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 8px;
      transition: .15s;
    }
    .dish-card.blocked { opacity: .6; }
    .dish-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .dish-name { font-size: 13px; font-weight: 600; }
    .dish-price { color: var(--ol-primary); font-weight: 700; font-size: 14px; }
    .dish-meta { font-size: 12px; color: var(--ol-muted); }
    .dish-err { font-size: 12px; color: var(--ol-danger); }
    .qty-row { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 999px; border: 1px solid var(--ol-border);
      background: #f8fafc; cursor: pointer;
    }
    .qty-btn.primary { background: var(--ol-primary); border-color: var(--ol-primary); color: #fff; }
    .qty-btn:disabled { opacity: .4; cursor: not-allowed; }
    .qty-num { min-width: 20px; text-align: center; font-weight: 600; font-size: 13px; }

    .order-card .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0;
    }
    .stat {
      border-radius: 10px;
      padding: 8px;
      background: #f8fafc;
      text-align: center;
    }
    .stat.accent { background: var(--ol-primary-soft); }
    .stat .num { font-size: 22px; font-weight: 700; }
    .stat .txt { font-size: 12px; color: var(--ol-muted); }
    .order-list {
      max-height: 380px;
      overflow: auto;
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    .order-item {
      border: 1px solid #edf2f7;
      border-radius: 9px;
      padding: 7px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      background: #fff;
    }
    .order-name { font-weight: 500; }
    .order-cat { color: var(--ol-muted); margin-top: 2px; }
    .order-empty {
      color: var(--ol-muted);
      font-size: 12px;
      text-align: center;
      padding: 18px 0;
    }
    .order-actions { display: flex; gap: 8px; margin-top: 10px; }

    .modal-mask {
      position: fixed; inset: 0; z-index: 1000;
      display: none; align-items: center; justify-content: center;
      background: rgba(2, 6, 23, .35); padding: 14px;
    }
    .modal {
      width: min(1020px, 100%);
      max-height: calc(100vh - 30px);
      overflow: auto;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--ol-border);
      box-shadow: 0 18px 40px rgba(15, 23, 42, .18);
    }
    .modal-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--ol-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .modal-head h3 { margin: 0; font-size: 16px; font-weight: 600; }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 999px;
      border: 1px solid var(--ol-border);
      background: #fff;
      cursor: pointer;
    }
    .modal-body { padding: 14px; display: grid; gap: 12px; }
    .steps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .step {
      display: grid; justify-items: center; gap: 4px;
    }
    .step-dot {
      width: 26px; height: 26px; border-radius: 999px;
      display: grid; place-items: center; font-size: 11px; font-weight: 700;
      background: #f1f5f9; color: #64748b;
      border: 1px solid #e2e8f0;
    }
    .step.done .step-dot { background: #16a34a; border-color: #16a34a; color: #fff; }
    .step.active .step-dot { background: var(--ol-primary); border-color: var(--ol-primary); color: #fff; }
    .step-text { font-size: 12px; color: var(--ol-muted); text-align: center; }
    .wizard-sec { border: 1px solid var(--ol-border); border-radius: 12px; padding: 12px; }
    .wizard-sec h4 { margin: 0 0 8px; font-size: 15px; font-weight: 600; }
    .wizard-sec--plain {
      border: 0;
      background: transparent;
      border-radius: 0;
      padding: 12px;
    }
    .choice-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .choice-grid.three { grid-template-columns: repeat(3, 1fr); }
    .choice {
      border: 2px solid var(--ol-border);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      font-size: 13px;
      line-height: 1.4;
    }
    .choice.active { border-color: var(--ol-primary); background: var(--ol-primary-soft); }
    .round-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .round-tab { border-radius: 999px; padding: 6px 10px; font-size: 12px; }
    .round-tab.active {
      background: var(--ol-primary-soft);
      border-color: #b9d8ff;
      color: #0d61cb;
      font-weight: 600;
    }
    .round-chip { display: inline-flex; align-items: center; gap: 4px; }
    .round-del {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid #fecaca;
      background: #fff5f5;
      color: #b91c1c;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }
    .round-del:hover { background: #fee2e2; }
    .entity-grid {
      max-height: 210px; overflow: auto;
      border: 1px solid var(--ol-border); border-radius: 10px;
      padding: 8px;
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px;
      margin-bottom: 8px;
    }
    .entity-item {
      border: 1px solid var(--ol-border); border-radius: 8px; padding: 6px;
      display: flex; align-items: center; gap: 6px; font-size: 12px;
      background: #fff;
    }
    .qty-list { display: grid; gap: 6px; max-height: 190px; overflow: auto; }
    .qty-row2 {
      display: grid; grid-template-columns: minmax(0,1fr) 110px; gap: 8px; align-items: center;
      border: 1px solid #edf2f7; border-radius: 8px; padding: 6px 8px;
      font-size: 12px;
    }
    .week-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .week-btn { width: 30px; height: 30px; border-radius: 999px; }
    .week-btn.active { background: var(--ol-primary); border-color: var(--ol-primary); color: #fff; }
    .weekday-block {
      border: 1px solid #e8edf3;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 8px;
    }
    .weekday-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }
    .time-row { display: grid; grid-template-columns: 1fr auto 1fr auto; gap: 8px; align-items: center; }
    .confirm-list { display: grid; gap: 7px; font-size: 13px; }
    .confirm-item { display: grid; grid-template-columns: 72px minmax(0,1fr); gap: 8px; }
    .confirm-k { color: var(--ol-muted); }
    .wizard-note {
      border-left: 3px solid var(--ol-primary);
      background: #f8fbff;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: #1e3a5f;
    }
    .modal-foot {
      border-top: 1px solid var(--ol-border);
      padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .foot-right { display: flex; gap: 8px; }

    @media (max-width: 1100px) {
      .sim-config { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .dish-grid { grid-template-columns: 1fr; }
      .entity-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 900px) {
      .sim-grid { grid-template-columns: 1fr; }
      .steps { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var embedded = params.get("embedded");
      var isEmbedded = embedded === "1" || embedded === "true";
      if (!isEmbedded) {
        try { isEmbedded = window.self !== window.top; } catch (e) { isEmbedded = false; }
      }
      if (isEmbedded) document.documentElement.classList.add("embedded-mode");
    })();
  </script>
</head>
<body>
  <div class="page">
    <section class="card header-card">
      <div class="header-title">
        <h1>下单限制</h1>
        <p>规则字段、向导校验、模拟校验逻辑与 emenuset 对齐（使用同一 localStorage 键）。</p>
      </div>
      <div class="header-actions">
        <button type="button" class="btn pill active" data-tab="rules">规则管理</button>
        <button type="button" class="btn pill" data-tab="simulator">点菜模拟</button>
        <button type="button" class="btn btn-primary" id="btnOpenCreate">+ 新建规则</button>
      </div>
    </section>

    <section class="card section-card" id="rulesPanel">
      <div class="section-head">
        <h2>现有规则</h2>
        <span class="badge primary" id="ruleCountBadge">共 0 条</span>
      </div>
      <div class="section-body">
        <table>
          <thead>
            <tr>
              <th>规则名称</th>
              <th>策略</th>
              <th>人数</th>
              <th>时间</th>
              <th>会员</th>
              <th>关联</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rulesTbody"></tbody>
        </table>
      </div>
    </section>

    <section class="card section-card" id="simulatorPanel" style="display:none">
      <div class="section-head">
        <h2>点菜模拟验证</h2>
        <span class="badge primary">规则实时校验</span>
      </div>
      <div class="section-body">
        <div class="sim-config">
          <label class="field">
            <span>测试规则</span>
            <select class="select" id="simRuleSelect"></select>
          </label>
          <label class="field">
            <span>用餐人数</span>
            <input class="input" id="simPersonCount" type="number" min="1" max="20" value="4" />
          </label>
          <label class="field">
            <span>会员等级</span>
            <select class="select" id="simMemberLevel"></select>
          </label>
          <div class="field">
            <span>当前轮次</span>
            <div style="display:flex;align-items:center;gap:6px;">
              <button class="btn" id="simPrevRound" type="button">←</button>
              <div class="input" style="text-align:center;flex:1;"><strong id="simRoundLabel">第 1 轮</strong></div>
              <button class="btn" id="simNextRound" type="button">→</button>
            </div>
          </div>
        </div>
        <div class="hint-bar" id="simViolations"></div>
        <div class="sim-grid">
          <div>
            <div class="cat-row" id="simCategoryRow"></div>
            <div class="dish-grid" id="simDishGrid"></div>
          </div>
          <aside class="card order-card" style="padding:10px;">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <strong style="font-size:14px;">本轮回单</strong>
              <button class="btn btn-danger" type="button" id="simClearRound">清空本轮</button>
            </div>
            <div class="stats">
              <div class="stat accent"><div class="num" id="simRoundTotal">0</div><div class="txt">本轮份数</div></div>
              <div class="stat"><div class="num" id="simAllTotal">0</div><div class="txt">总份数</div></div>
            </div>
            <div class="order-list" id="simOrderList"></div>
            <div class="order-actions">
              <button class="btn btn-danger" type="button" id="simClearAll" style="width:100%;">清空全部轮次</button>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </div>

  <div class="modal-mask" id="wizardMask">
    <div class="modal">
      <div class="modal-head">
        <h3 id="wizardTitle">新建规则</h3>
        <button class="icon-btn" id="wizardClose" type="button">✕</button>
      </div>
      <div class="modal-body">
        <div class="steps" id="wizardSteps"></div>
        <div id="wizardContent"></div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn" id="wizardPrev">上一步</button>
        <div class="foot-right">
          <button type="button" class="btn" id="wizardCancel">取消</button>
          <button type="button" class="btn btn-primary" id="wizardNext">下一步</button>
        </div>
      </div>
    </div>
  </div>

        if (round === "多轮") return "multiRound";

      function labelToMethodKey(method) { return method === "按每种菜品限购" ? "perDish" : "perCategory"; }

      function parsePersonRanges(persons) {
        if (persons.indexOf("所有") >= 0) return [{ min: 1, max: 99 }];
        var parts = persons.split("，");
        var out = [];
        for (var i = 0; i < parts.length; i++) {
          var m = parts[i].match(/(\d+)-(\d+)/);
          if (m) out.push({ min: Number(m[1]), max: Number(m[2]) });
        }
        return out.length ? out : [{ min: 1, max: 4 }];
      }

          maxSingleOrder: draft.type === "perTable" && !isMulti ? draft.maxSingleOrder : undefined,
          enableMemberLevels: !!draft.enableMemberLevels,
          memberLevels: draft.enableMemberLevels ? draft.selectedMemberLevels : undefined,
          enableTimeSettings: !!draft.enableTimeSettings,
          weekdays: draft.enableTimeSettings ? draft.selectedWeekdays : undefined,
          timeRanges: draft.enableTimeSettings ? firstWeekdayRanges : undefined,
          weekdayTimeRanges: draft.enableTimeSettings ? weekdayTimeRanges : undefined,
          maxRounds: draft.maxRounds
        };
      }

      function validateDraftStep2(draft) {
        if (!draft.name.trim()) return "请输入规则名称";
        if (!draft.personRanges.length) return "请至少设置一个人数区间";
        if (draft.round === "multiRound") {
          if (!draft.rounds.length) return "请至少添加一个轮次";
          for (var i = 0; i < draft.rounds.length; i++) {
            var round = draft.rounds[i];
            if (draft.method === "perCategory" && !round.selectedCategories.length) return "第 " + (i + 1) + " 轮请至少选择一个菜品分类";
            if (draft.method === "perDish" && !round.selectedDishes.length) return "第 " + (i + 1) + " 轮请至少选择一个菜品";
            var hasQty = Object.values(round.quantitySettings || {}).some(function (v) { return v > 0; });
            if (!hasQty) return "第 " + (i + 1) + " 轮请至少设置一个限购数量";
          }
          return null;
        }
        if (draft.method === "perCategory" && !draft.selectedCategories.length) return "请至少选择一个菜品分类";
        if (draft.method === "perDish" && !draft.selectedDishes.length) return "请至少选择一个菜品";
        var hasQty2 = Object.values(draft.quantitySettings || {}).some(function (v) { return v > 0; });
        if (!hasQty2) return "请至少设置一个限购数量";
        return null;
      }

      function getCategoryIdByName(name) {
        var c = dishCategories.find(function (x) { return x.name === name; });
        return c ? c.id : undefined;
      }
      function getRoundSettings(rule, round) {
        var isMultiRound = rule.round === "多轮";
        var roundConfig = rule.rounds && rule.rounds[round - 1];
        if (isMultiRound && roundConfig) {
          return {
            roundName: roundConfig.roundName,
            selectedCategories: roundConfig.selectedCategories || [],
            selectedDishes: roundConfig.selectedDishes || [],
            quantitySettings: roundConfig.quantitySettings || {},
            maxSameDishSettings: roundConfig.maxSameDishSettings,
            minTotalQuantity: roundConfig.minTotalQuantity,
            maxTotalQuantity: roundConfig.maxTotalQuantity,
            minPerPersonQuantity: roundConfig.minPerPersonQuantity,
            maxPerPersonQuantity: roundConfig.maxPerPersonQuantity,
            minSingleOrder: roundConfig.minSingleOrder,
            maxSingleOrder: roundConfig.maxSingleOrder
          };
        }
        return {
          roundName: "单轮",
          selectedCategories: rule.selectedCategories || [],
          selectedDishes: rule.selectedDishes || [],
          quantitySettings: rule.quantitySettings || {},
          maxSameDishSettings: rule.maxSameDishSettings,
          minTotalQuantity: rule.minTotalQuantity,
          maxTotalQuantity: rule.maxTotalQuantity,
          minPerPersonQuantity: rule.minPerPersonQuantity,
          maxPerPersonQuantity: rule.maxPerPersonQuantity,
          minSingleOrder: rule.minSingleOrder,
          maxSingleOrder: rule.maxSingleOrder
        };
      }
      function validateOrderItem(rule, newItem, ctx) {
        var violations = [];
        var personCount = ctx.personCount;
        var currentRoundItems = ctx.currentRoundItems;
        var isPerTable = rule.type === "按桌/订单限购";
        var settings = getRoundSettings(rule, newItem.round);

        if (rule.maxRounds !== undefined && newItem.round > rule.maxRounds) {
          violations.push({ type: "error", message: "该规则仅在第 1–" + rule.maxRounds + " 轮生效，当前为第 " + newItem.round + " 轮，无法下单" });
          return violations;
        }
        if (settings.maxTotalQuantity !== undefined) {
          var currentTotal = currentRoundItems.reduce(function (s, i) { return s + i.quantity; }, 0);
          var newTotal = currentTotal + newItem.quantity;
          if (newTotal > settings.maxTotalQuantity) {
            violations.push({ type: "error", message: "每轮总数量不能超过 " + settings.maxTotalQuantity + " 份（当前 " + currentTotal + " 份，拟加 " + newItem.quantity + " 份）" });
          }
        }
        if (isPerTable && settings.maxPerPersonQuantity !== undefined && personCount > 0) {
          var cur = currentRoundItems.reduce(function (s, i) { return s + i.quantity; }, 0);
          var next = cur + newItem.quantity;
          var perPerson = Math.ceil(next / personCount);
          if (perPerson > settings.maxPerPersonQuantity) {
            violations.push({ type: "error", message: "每人每轮不能超过 " + settings.maxPerPersonQuantity + " 份（当前约 " + Math.ceil(cur / personCount) + " 份/人）" });
          }
        }
        if (isPerTable && settings.maxSingleOrder !== undefined && newItem.quantity > settings.maxSingleOrder) {
          violations.push({ type: "error", message: "单次下单不能超过 " + settings.maxSingleOrder + " 份" });
        }
        if (rule.method === "按每种菜品限购") {
          var maxSameDish = settings.quantitySettings["dish_" + newItem.dishId];
          if (maxSameDish !== undefined) {
            var existing = currentRoundItems.find(function (i) { return i.dishId === newItem.dishId; });
            var currentQ = existing ? existing.quantity : 0;
            var nextQ = currentQ + newItem.quantity;
            if (nextQ > maxSameDish) {
              violations.push({ type: "error", message: newItem.dishName + (isPerTable ? "每桌" : "每人") + "每轮限购 " + maxSameDish + " 份（已点 " + currentQ + " 份）", dishName: newItem.dishName });
            }
          }
        }
        if (rule.method === "按每个分类限购") {
          var categoryId = getCategoryIdByName(newItem.category);
          if (categoryId !== undefined && settings.selectedCategories.indexOf(categoryId) >= 0) {
            var maxCategory = settings.quantitySettings["category_" + categoryId];
            if (maxCategory !== undefined) {
              var categoryTotal = currentRoundItems.filter(function (i) { return i.category === newItem.category; }).reduce(function (s, i) { return s + i.quantity; }, 0);
              var newCategoryTotal = categoryTotal + newItem.quantity;
              if (newCategoryTotal > maxCategory) {
                violations.push({ type: "error", message: newItem.category + " 限购 " + maxCategory + " 份（当前 " + categoryTotal + " 份）" });
              }
            }
            var maxSame = settings.maxSameDishSettings && settings.maxSameDishSettings["category_" + categoryId];
            if (maxSame !== undefined) {
              var existing2 = currentRoundItems.find(function (i) { return i.dishId === newItem.dishId; });
              var currentQ2 = existing2 ? existing2.quantity : 0;
              var nextQ2 = currentQ2 + newItem.quantity;
              if (nextQ2 > maxSame) {
                violations.push({ type: "error", message: newItem.dishName + " 限购 " + maxSame + " 份（已点 " + currentQ2 + " 份）", dishName: newItem.dishName });
              }
            }
          }
        }
        return violations;
      }
      function canAddDish(rule, newItem, ctx) {
        if (!rule || rule.status !== "active") return { canAdd: true };
        var violations = validateOrderItem(rule, newItem, ctx);
        if (violations.length > 0) return { canAdd: false, reason: violations[0].message };
        return { canAdd: true };
      }

      function loadRules() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return initialRules();
          var parsed = JSON.parse(raw);
          return Array.isArray(parsed) && parsed.length > 0 ? parsed : initialRules();
        } catch (e) {
          return initialRules();
        }
      }
      function saveRules(rules) { localStorage.setItem(STORAGE_KEY, JSON.stringify(rules)); }
      function nextRuleId(rules) { return rules.reduce(function (m, r) { return Math.max(m, r.id); }, 0) + 1; }
      function esc(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      var state = {
        tab: "rules",

      }
      function buildRulePreview(draft) {

        return {

          descText: draft.method === "perCategory" ? "按菜品分类设置限购数量" : "按具体菜品设置限购数量"

          btn.classList.toggle("active", btn.getAttribute("data-tab") === tab);

      function renderRuleTable() {

          var memberTxt = rule.enableMemberLevels && rule.memberLevels && rule.memberLevels.length
            ? rule.memberLevels.map(function (id) {
                var lv = memberLevels.find(function (m) { return m.id === id; });

              }).join("、")
            : "全部";
          return (

              "<td><div style='font-weight:600;'>" + esc(rule.name) + "</div><div class='sub'>" + esc(rule.description || "") + "</div></td>" +

              "<td style='max-width:160px;'>" + esc(memberTxt) + "</td>" +
              "<td style='max-width:220px;'><span class='sub'>" + esc(rule.dishes) + "</span></td>" +

              "<td><div class='op-row'>" +
                "<button class='btn' data-rule-action='edit' data-rule-id='" + rule.id + "'>编辑</button>" +

                "<button class='btn' data-rule-action='toggle' data-rule-id='" + rule.id + "'>" + (rule.status === "active" ? "禁用" : "启用") + "</button>" +
                "<button class='btn btn-danger' data-rule-action='delete' data-rule-id='" + rule.id + "'>删除</button>" +
              "</div></td>" +
            "</tr>"
          );
        }).join("");
      }

      function renderSimulatorSelectors() {
        var select = document.getElementById("simRuleSelect");
        var activeRules = getActiveRules();

        var options = ["<option value=''>不应用规则</option>"];
        activeRules.forEach(function (r) {
          options.push("<option value='" + r.id + "'" + (state.sim.selectedRuleId === r.id ? " selected" : "") + ">" + esc(r.name) + "</option>");
        });

          options.push("<optgroup label='已禁用'>");

          });
          options.push("</optgroup>");
        }
        select.innerHTML = options.join("");

        var memberSelect = document.getElementById("simMemberLevel");
        memberSelect.innerHTML = memberLevels.map(function (m) {
          var sel = state.sim.memberLevel === m.id ? " selected" : "";
          return "<option value='" + m.id + "'" + sel + ">" + esc(m.icon + " " + m.name) + "</option>";
        }).join("");

        document.getElementById("simPersonCount").value = String(state.sim.personCount);
        document.getElementById("simRoundLabel").textContent = "第 " + state.sim.currentRound + " 轮";
      }

      function renderSimulatorCategories() {
        var row = document.getElementById("simCategoryRow");
        var html = [];
        var allActive = state.sim.activeCategory === "all" ? " active" : "";
        html.push("<button type='button' class='cat-pill" + allActive + "' data-sim-cat='all'>全部 (" + dishes.length + ")</button>");
        dishCategories.forEach(function (c) {
          var active = state.sim.activeCategory === c.name ? " active" : "";
          html.push("<button type='button' class='cat-pill" + active + "' data-sim-cat='" + esc(c.name) + "'>" + esc(c.name) + " (" + c.count + ")</button>");
        });
        row.innerHTML = html.join("");
      }

      function renderSimulatorDishGrid() {
        var grid = document.getElementById("simDishGrid");
        var selectedRule = getSelectedRule();
        var filtered = state.sim.activeCategory === "all"
          ? dishes
          : dishes.filter(function (d) { return d.category === state.sim.activeCategory; });
        var roundItems = state.sim.orderItems.filter(function (i) { return i.round === state.sim.currentRound; });
        var html = filtered.map(function (dish) {
          var existing = roundItems.find(function (i) { return i.dishId === dish.id; });
          var qty = existing ? existing.quantity : 0;
          var probe = {
            dishId: dish.id,
            dishName: dish.name,
            category: dish.category,
            price: dish.price,
            quantity: 1,
            round: state.sim.currentRound
          };
          var check = canAddDish(selectedRule, probe, { personCount: state.sim.personCount, currentRoundItems: roundItems });
          var blocked = !!selectedRule && !check.canAdd && qty === 0;
          return (
            "<article class='dish-card" + (blocked ? " blocked" : "") + "'>" +
              "<div class='dish-top'><div><div class='dish-name'>" + esc(dish.name) + "</div><div class='dish-meta'>" + esc(dish.description || "") + "</div></div><div class='dish-price'>" + esc(dish.price) + "</div></div>" +
              (blocked && check.reason ? "<div class='dish-err'>" + esc(check.reason) + "</div>" : "<div class='dish-meta'>" + esc(dish.category) + "</div>") +
              "<div class='qty-row'>" +
                "<button class='qty-btn' data-dish-op='minus' data-dish-id='" + dish.id + "'" + (qty <= 0 ? " disabled" : "") + ">−</button>" +
                "<span class='qty-num'>" + qty + "</span>" +
                "<button class='qty-btn primary' data-dish-op='plus' data-dish-id='" + dish.id + "'" + (blocked ? " disabled" : "") + ">+</button>" +
              "</div>" +
            "</article>"
          );
        });
        grid.innerHTML = html.join("");

          (!isMulti

                "<label class='field'><span>每轮最大总份数</span><input class='input' type='number' min='0' id='wMaxTotal' value='" + esc(draft.maxTotalQuantity || "") + "' /></label>" +
                "<label class='field'><span>最大生效轮次</span><input class='input' type='number' min='1' id='wMaxRounds' value='" + esc(draft.maxRounds || "") + "' /></label>" +
                "<label class='field'><span>每人每轮上限</span><input class='input' type='number' min='0' id='wMaxPerPerson' value='" + esc(draft.maxPerPersonQuantity || "") + "' /></label>" +
                "<label class='field'><span>单次下单上限</span><input class='input' type='number' min='0' id='wMaxSingle' value='" + esc(draft.maxSingleOrder || "") + "' /></label>" +
              "</div></div>"
            : "")
        );
      }

      function renderStepTime() {
        var draft = state.draft;
        var weekBtns = weekdays.map(function (w) {
          var active = draft.selectedWeekdays.indexOf(w.id) >= 0 ? " active" : "";
          return "<button type='button' class='btn week-btn" + active + "' data-week-id='" + w.id + "'>" + w.short + "</button>";
        }).join("");
        var weekdayBlocks = (draft.selectedWeekdays || []).map(function (dayId) {
          var week = weekdays.find(function (w) { return w.id === dayId; });
          var title = week ? week.name : dayId;
          var ranges = (draft.weekdayTimeRanges && draft.weekdayTimeRanges[dayId]) || [];
          var rows = ranges.map(function (t, i) {
            return (
              "<div class='time-row'>" +
                "<input class='input' type='time' data-time-start-week='" + dayId + "' data-time-start-index='" + i + "' value='" + esc(t.start) + "' />" +
                "<span style='font-size:12px;color:#6b7280;'>至</span>" +
                "<input class='input' type='time' data-time-end-week='" + dayId + "' data-time-end-index='" + i + "' value='" + esc(t.end) + "' />" +
                "<button type='button' class='btn btn-danger' data-time-del-week='" + dayId + "' data-time-del-index='" + i + "'>删除</button>" +
              "</div>"
            );
          }).join("");
          return (
            "<div class='weekday-block'>" +
              "<div class='weekday-head'>" +
                "<span>" + esc(title) + "</span>" +
                "<button class='btn' type='button' data-time-add-week='" + dayId + "'>+ 添加时段</button>" +
              "</div>" +
              (rows || "<div style='font-size:12px;color:#6b7280;'>暂无时段，请添加</div>") +
            "</div>"
          );
        }).join("");
        return (
          "<div class='wizard-sec'>" +
            "<label style='display:flex;align-items:center;justify-content:space-between;gap:8px;'>" +
              "<strong style='font-size:13px;'>启用时间段限制</strong>" +
              "<input type='checkbox' id='wEnableTime' " + (draft.enableTimeSettings ? "checked" : "") + " />" +
            "</label>" +
            (draft.enableTimeSettings
              ? "<div style='margin-top:10px;display:grid;gap:8px;'><div class='week-row'>" + weekBtns + "</div>" + (weekdayBlocks || "<div style='font-size:12px;color:#6b7280;'>请选择至少一个星期周期</div>") + "</div>"
              : "") +
          "</div>"
        );
      }

      function renderStepMember() {
        var draft = state.draft;
        var levelBtns = memberLevels.map(function (m) {
          var active = draft.selectedMemberLevels.indexOf(m.id) >= 0 ? " active" : "";
          return "<button type='button' class='btn round-tab" + active + "' data-member-id='" + m.id + "'>" + esc(m.icon + " " + m.name) + "</button>";
        }).join("");
        return (
          "<div class='wizard-sec'>" +
            "<label style='display:flex;align-items:center;justify-content:space-between;gap:8px;'>" +
              "<strong style='font-size:13px;'>按会员等级差异化</strong>" +
              "<input type='checkbox' id='wEnableMember' " + (draft.enableMemberLevels ? "checked" : "") + " />" +
            "</label>" +
            (draft.enableMemberLevels ? "<div style='margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;'>" + levelBtns + "</div>" : "") +
          "</div>"
        );
      }

      function renderStepConfirm() {
        var draft = state.draft;
        var rule = draftToRule(draft);
        return (
          "<div class='wizard-sec'><div class='confirm-list'>" +
            cRow("名称", rule.name) +
            cRow("类型", rule.type + " / " + rule.round + " / " + rule.method) +
            cRow("人数", rule.persons) +
            cRow("关联", rule.dishes) +
            cRow("描述", rule.description) +
          "</div></div>"
        );
      }

      function cRow(k, v) {
        return "<div class='confirm-item'><span class='confirm-k'>" + esc(k) + "</span><span>" + esc(v || "") + "</span></div>";
      }

      function choice(field, value, selected, title, desc) {
        var active = value === selected ? " active" : "";
        return "<button type='button' class='choice" + active + "' data-choice-field='" + field + "' data-choice-value='" + value + "'><div style='font-weight:600;'>" + esc(title) + "</div><div style='margin-top:2px;color:#6b7280;font-size:11px;'>" + esc(desc) + "</div></button>";
      }

      function renderWizard() {
        renderWizardSteps();
        var content = document.getElementById("wizardContent");
        if (state.draft.step === 1) content.innerHTML = renderStepType();
        if (state.draft.step === 2) content.innerHTML = renderStepConfig();
        if (state.draft.step === 3) content.innerHTML = renderStepTime();
        if (state.draft.step === 4) content.innerHTML = renderStepMember();
        if (state.draft.step === 5) content.innerHTML = renderStepConfirm();

        document.getElementById("wizardPrev").disabled = state.draft.step === 1;
        document.getElementById("wizardNext").textContent = state.draft.step === 5
          ? (state.editingRuleId != null ? "更新规则" : "保存规则")
          : "下一步";
      }

      function wizardNext() {
        var d = state.draft;
        if (d.step === 1) {
          if (!d.type || !d.round || !d.method) { alert("请完成规则类型选择"); return; }
          if (d.round === "multiRound" && d.rounds.length === 0) {
            d.rounds = [{ roundName: "第一轮", selectedCategories: [], selectedDishes: [], quantitySettings: {} }];
            d.activeRound = 0;
          }
          d.step = 2;
          renderWizard();
          return;
        }
        if (d.step === 2) {
          var err = validateDraftStep2(d);
          if (err) { alert(err); return; }
          d.step = 3;
          renderWizard();
          return;
        }
        if (d.step === 3) { d.step = 4; renderWizard(); return; }
        if (d.step === 4) { d.step = 5; renderWizard(); return; }
        if (d.step === 5) {
          if (state.editingRuleId != null) {
            state.rules = state.rules.map(function (r) {
              if (r.id !== state.editingRuleId) return r;
              var updated = draftToRule(d, r);
              updated.id = r.id;
              return updated;
            });
          } else {
            var newRule = draftToRule(d);
            newRule.id = nextRuleId(state.rules);
            state.rules.push(newRule);
          }
          saveRules(state.rules);
          closeWizard();
          renderAll();
        }
      }

      function wizardPrev() {
        if (state.draft.step > 1) {
          state.draft.step -= 1;
          renderWizard();
        }
      }

      function changeQuantity(dish, delta) {
        if (delta === 0) return;
        var sim = state.sim;
        var existing = sim.orderItems.find(function (i) { return i.dishId === dish.id && i.round === sim.currentRound; });
        if (delta < 0) {
          if (!existing) return;
          var nextQty = existing.quantity + delta;
          sim.violations = [];
          if (nextQty <= 0) {
            sim.orderItems = sim.orderItems.filter(function (i) { return !(i.dishId === dish.id && i.round === sim.currentRound); });
          } else {
            sim.orderItems = sim.orderItems.map(function (i) {
              if (i.dishId === dish.id && i.round === sim.currentRound) return Object.assign({}, i, { quantity: nextQty });
              return i;
            });
          }
          renderSimulator();
          return;
        }

        var newItem = {
          dishId: dish.id,
          dishName: dish.name,
          category: dish.category,
          price: dish.price,
          quantity: delta,
          round: sim.currentRound
        };
        var selectedRule = getSelectedRule();
        if (selectedRule) {
          var roundItems = sim.orderItems.filter(function (i) { return i.round === sim.currentRound; });
          var v = validateOrderItem(selectedRule, newItem, { personCount: sim.personCount, currentRoundItems: roundItems });
          if (v.length) {
            sim.violations = v;
            renderSimulator();
            return;
          }
        }

        sim.violations = [];
        if (existing) {
          sim.orderItems = sim.orderItems.map(function (i) {
            if (i.dishId === dish.id && i.round === sim.currentRound) return Object.assign({}, i, { quantity: i.quantity + delta });
            return i;
          });
        } else {
          sim.orderItems.push(newItem);
        }
        renderSimulator();
      }

      function handleRuleAction(action, id) {
        var rule = state.rules.find(function (r) { return r.id === id; });
        if (!rule) return;
        if (action === "edit") { openWizard(rule); return; }
        if (action === "copy") {
          var copy = Object.assign({}, rule, {
            id: nextRuleId(state.rules),
            name: rule.name + " (副本)",
            status: "inactive",
            created: new Date().toISOString().split("T")[0]
          });
          state.rules.push(copy);
          saveRules(state.rules);
          renderAll();
          return;
        }
        if (action === "toggle") {
          rule.status = rule.status === "active" ? "inactive" : "active";
          saveRules(state.rules);
          renderAll();
          return;
        }
        if (action === "delete") {
          if (!window.confirm("确定删除该规则？")) return;
          state.rules = state.rules.filter(function (r) { return r.id !== id; });
          saveRules(state.rules);
          renderAll();
        }
      }

      function renderAll() {
        renderRuleTable();
        renderSimulator();
      }

      document.addEventListener("click", function (e) {
        var tabBtn = e.target.closest(".pill[data-tab]");
        if (tabBtn) {
          setTab(tabBtn.getAttribute("data-tab"));
          return;
        }

        var openCreate = e.target.closest("#btnOpenCreate");
        if (openCreate) { openWizard(null); return; }

        var ruleActionBtn = e.target.closest("[data-rule-action]");
        if (ruleActionBtn) {
          handleRuleAction(ruleActionBtn.getAttribute("data-rule-action"), Number(ruleActionBtn.getAttribute("data-rule-id")));
          return;
        }

        var simCat = e.target.closest("[data-sim-cat]");
        if (simCat) {
          state.sim.activeCategory = simCat.getAttribute("data-sim-cat");
          renderSimulator();
          return;
        }

        var dishOp = e.target.closest("[data-dish-op]");
        if (dishOp) {
          var did = Number(dishOp.getAttribute("data-dish-id"));
          var dish = dishes.find(function (d) { return d.id === did; });
          if (!dish) return;
          changeQuantity(dish, dishOp.getAttribute("data-dish-op") === "plus" ? 1 : -1);
          return;
        }

        var orderOp = e.target.closest("[data-order-op]");
        if (orderOp) {
          var did2 = Number(orderOp.getAttribute("data-dish-id"));
          var dish2 = dishes.find(function (d) { return d.id === did2; });
          if (!dish2) return;
          changeQuantity(dish2, orderOp.getAttribute("data-order-op") === "plus" ? 1 : -1);
          return;
        }

        var mask = e.target.closest("#wizardMask");
        if (mask && e.target.id === "wizardMask") {
          closeWizard();
          return;
        }

        if (!state.wizardOpen) return;
        var d = state.draft;
        var choiceBtn = e.target.closest("[data-choice-field]");
        if (choiceBtn) {
          d[choiceBtn.getAttribute("data-choice-field")] = choiceBtn.getAttribute("data-choice-value");
          renderWizard();
          return;
        }
        var roundTab = e.target.closest("[data-round-index]");
        if (roundTab) {
          d.activeRound = Number(roundTab.getAttribute("data-round-index"));
          renderWizard();
          return;
        }
        var roundAdd = e.target.closest("[data-round-add]");
        if (roundAdd) {
          d.rounds.push({
            roundName: "第" + (d.rounds.length + 1) + "轮",
            selectedCategories: [],
            selectedDishes: [],
            quantitySettings: {}
          });
          d.activeRound = d.rounds.length - 1;
          renderWizard();
          return;
        }
        var roundDel = e.target.closest("[data-round-del]");
        if (roundDel) {
          var delIndex = Number(roundDel.getAttribute("data-round-del"));
          if (Number.isFinite(delIndex) && delIndex >= 0 && delIndex < d.rounds.length) {
            d.rounds.splice(delIndex, 1);
            if (d.rounds.length === 0) {
              d.activeRound = 0;
            } else if (d.activeRound >= d.rounds.length) {
              d.activeRound = d.rounds.length - 1;
            } else if (delIndex <= d.activeRound && d.activeRound > 0) {
              d.activeRound -= 1;
            }
          }
          renderWizard();
          return;
        }
        var weekBtn = e.target.closest("[data-week-id]");
        if (weekBtn) {
          var wid = weekBtn.getAttribute("data-week-id");
          var idx = d.selectedWeekdays.indexOf(wid);
          if (idx >= 0) {
            d.selectedWeekdays.splice(idx, 1);
            if (d.weekdayTimeRanges) delete d.weekdayTimeRanges[wid];
          } else {
            d.selectedWeekdays.push(wid);
            if (!d.weekdayTimeRanges) d.weekdayTimeRanges = {};
            if (!d.weekdayTimeRanges[wid] || !d.weekdayTimeRanges[wid].length) {
              d.weekdayTimeRanges[wid] = [{ start: "11:00", end: "14:00" }];
            }
          }
          renderWizard();
          return;
        }
        var addTime = e.target.closest("[data-time-add-week]");
        if (addTime) {
          var addWeek = addTime.getAttribute("data-time-add-week");
          if (addWeek) {
            if (!d.weekdayTimeRanges) d.weekdayTimeRanges = {};
            if (!d.weekdayTimeRanges[addWeek]) d.weekdayTimeRanges[addWeek] = [];
            d.weekdayTimeRanges[addWeek].push({ start: "11:00", end: "14:00" });
          }
          renderWizard();
          return;
        }
        var delTime = e.target.closest("[data-time-del-week]");
        if (delTime) {
          var delWeek = delTime.getAttribute("data-time-del-week");
          var delIdx = Number(delTime.getAttribute("data-time-del-index"));
          if (delWeek && d.weekdayTimeRanges && d.weekdayTimeRanges[delWeek]) {
            d.weekdayTimeRanges[delWeek].splice(delIdx, 1);
          }
          renderWizard();
          return;
        }
        var memberBtn = e.target.closest("[data-member-id]");
        if (memberBtn) {
          var mid = memberBtn.getAttribute("data-member-id");
          var mIdx = d.selectedMemberLevels.indexOf(mid);
          if (mIdx >= 0) d.selectedMemberLevels.splice(mIdx, 1);
          else d.selectedMemberLevels.push(mid);
          renderWizard();
        }
      });

      document.addEventListener("change", function (e) {
        if (e.target.id === "simRuleSelect") {
          var val = e.target.value;
          state.sim.selectedRuleId = val ? Number(val) : null;
          renderSimulator();
          return;
        }
        if (e.target.id === "simPersonCount") {
          state.sim.personCount = Math.max(1, Number(e.target.value) || 1);
          renderSimulator();
          return;
        }
        if (e.target.id === "simMemberLevel") {
          state.sim.memberLevel = e.target.value;
          renderSimulator();
          return;
        }
        if (!state.wizardOpen) return;

        var d = state.draft;
        if (e.target.id === "wName") d.name = e.target.value;
        if (e.target.id === "wDesc") d.description = e.target.value;
        if (e.target.id === "wMaxTotal") d.maxTotalQuantity = e.target.value ? Number(e.target.value) : undefined;
        if (e.target.id === "wMaxRounds") d.maxRounds = e.target.value ? Number(e.target.value) : undefined;
        if (e.target.id === "wMaxPerPerson") d.maxPerPersonQuantity = e.target.value ? Number(e.target.value) : undefined;
        if (e.target.id === "wMaxSingle") d.maxSingleOrder = e.target.value ? Number(e.target.value) : undefined;
        if (e.target.id === "wEnableTime") d.enableTimeSettings = !!e.target.checked;
        if (e.target.id === "wEnableMember") {
          d.enableMemberLevels = !!e.target.checked;
          d.selectedMemberLevels = d.enableMemberLevels ? memberLevels.map(function (m) { return m.id; }) : [];
        }

        var toggle = e.target.getAttribute && e.target.getAttribute("data-entity-toggle");
        if (toggle) {
          var id = Number(toggle);
          var isMulti = d.round === "multiRound";
          var method = d.method;
          if (isMulti) {
            var round = d.rounds[d.activeRound];
            if (!round) return;
            var arr = method === "perCategory" ? round.selectedCategories : round.selectedDishes;
            var i = arr.indexOf(id);
            if (i >= 0) arr.splice(i, 1);
            else arr.push(id);
          } else {
            var arr2 = method === "perCategory" ? d.selectedCategories : d.selectedDishes;
            var j = arr2.indexOf(id);
            if (j >= 0) arr2.splice(j, 1);
            else arr2.push(id);
          }
        }

        var qtyKey = e.target.getAttribute && e.target.getAttribute("data-qty-key");
        if (qtyKey) {
          var num = Number(e.target.value) || 0;
          if (d.round === "multiRound") {
            var r = d.rounds[d.activeRound];
            if (r) r.quantitySettings[qtyKey] = num;
          } else d.quantitySettings[qtyKey] = num;
        }

        var tsWeek = e.target.getAttribute && e.target.getAttribute("data-time-start-week");
        var tsIdx = e.target.getAttribute && e.target.getAttribute("data-time-start-index");
        var teWeek = e.target.getAttribute && e.target.getAttribute("data-time-end-week");
        var teIdx = e.target.getAttribute && e.target.getAttribute("data-time-end-index");
        if (tsWeek != null && tsIdx != null && d.weekdayTimeRanges && d.weekdayTimeRanges[tsWeek] && d.weekdayTimeRanges[tsWeek][Number(tsIdx)]) {
          d.weekdayTimeRanges[tsWeek][Number(tsIdx)].start = e.target.value;
        }
        if (teWeek != null && teIdx != null && d.weekdayTimeRanges && d.weekdayTimeRanges[teWeek] && d.weekdayTimeRanges[teWeek][Number(teIdx)]) {
          d.weekdayTimeRanges[teWeek][Number(teIdx)].end = e.target.value;
        }

        renderWizard();
      });

      document.getElementById("simPrevRound").addEventListener("click", function () {
        state.sim.currentRound = Math.max(1, state.sim.currentRound - 1);
        renderSimulator();
      });
      document.getElementById("simNextRound").addEventListener("click", function () {
        state.sim.currentRound = Math.min(state.sim.totalRounds, state.sim.currentRound + 1);
        renderSimulator();
      });
      document.getElementById("simClearRound").addEventListener("click", function () {
        state.sim.orderItems = state.sim.orderItems.filter(function (i) { return i.round !== state.sim.currentRound; });
        state.sim.violations = [];
        renderSimulator();
      });
      document.getElementById("simClearAll").addEventListener("click", function () {
        state.sim.orderItems = [];
        state.sim.violations = [];
        renderSimulator();
      });

      document.getElementById("wizardClose").addEventListener("click", closeWizard);
      document.getElementById("wizardCancel").addEventListener("click", closeWizard);
      document.getElementById("wizardPrev").addEventListener("click", wizardPrev);
      document.getElementById("wizardNext").addEventListener("click", wizardNext);

      window.addEventListener("keydown", function (e) {
        if (!state.wizardOpen) return;
        if (e.key === "Escape") closeWizard();
      });

      renderAll();
      setTab("rules");
    })();
  </script>
</body>
</html>
