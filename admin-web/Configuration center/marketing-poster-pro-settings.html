<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>海报 Pro 设置</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/common.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#1677ff", brand: "#eab308", "brand-dark": "#ca8a04" },
          borderRadius: { ant: "6px" },
        },
      },
    };
  </script>
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search);
      var embedded = p.get("embedded");
      if (embedded === "1" || embedded === "true") document.documentElement.classList.add("embedded-mode");
      else {
        try { if (window.self !== window.top) document.documentElement.classList.add("embedded-mode"); } catch (e) {}
      }
    })();
  </script>
  <style>
    .poster-pro-canvas-wrap {
      width: min(100%, 22.5rem);
      aspect-ratio: 9 / 16;
    }
    .poster-pro-canvas {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #e8e8e8;
      user-select: none;
    }
    .poster-pro-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
    .poster-pro-component {
      position: absolute;
      cursor: move;
      touch-action: none;
    }
    .poster-pro-component.selected {
      outline: 2px solid #eab308;
      outline-offset: 1px;
    }
    .palette-btn:active { transform: scale(0.98); }
  </style>
</head>
<body class="bg-[#f5f6f7] text-gray-900 antialiased">
  <div class="flex min-h-screen flex-col">
    <header class="flex-shrink-0 border-b border-gray-200 bg-white px-4 py-3 sm:px-6">
      <div class="flex items-center justify-between gap-4">
        <a id="backLink" href="marketing-ads-list.html" class="text-sm text-gray-600 hover:text-primary">返回</a>
        <h1 class="text-base font-semibold text-gray-900 sm:text-lg">海报 Pro 设置</h1>
        <div class="flex items-center gap-2">
          <button type="button" id="deactivateBtn" class="rounded-md border border-red-200 bg-white px-3 py-1.5 text-sm text-red-600 hover:bg-red-50">停用</button>
          <button type="button" id="saveBtn" class="rounded-md bg-brand px-3 py-1.5 text-sm font-medium text-gray-900 hover:bg-brand-dark hover:text-white">保存</button>
        </div>
      </div>
    </header>

    <main class="flex flex-1 flex-col gap-4 p-4 lg:flex-row lg:gap-6 lg:p-6">
      <section class="flex min-w-0 flex-1 flex-col items-center lg:items-start">
        <div class="mb-3 flex w-full max-w-md flex-wrap items-center justify-between gap-2">
          <p class="text-sm text-gray-600">当前宽高比：<span id="aspectLabel">9 / 16</span></p>
          <label class="inline-flex cursor-pointer items-center gap-2 rounded-md border border-gray-300 bg-white px-3 py-1.5 text-sm hover:bg-gray-50">
            <span>上传背景图</span>
            <input type="file" id="bgInput" accept="image/png,image/jpeg,image/gif,.png,.jpg,.jpeg,.gif" class="hidden" />
          </label>
        </div>
        <div class="poster-pro-canvas-wrap rounded-lg border border-gray-300 bg-white shadow-sm">
          <div id="canvas" class="poster-pro-canvas" aria-label="海报画布">
            <img id="bgImage" alt="" class="poster-pro-bg hidden" />
            <div id="bgPlaceholder" class="absolute inset-0 flex items-center justify-center text-sm text-gray-400">请上传背景图</div>
            <div id="componentsLayer"></div>
          </div>
        </div>
      </section>

      <aside class="w-full shrink-0 lg:w-80">
        <div id="palettePanel" class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
          <h2 class="mb-3 text-sm font-semibold text-gray-900">可用组件</h2>
          <div class="grid grid-cols-2 gap-2">
            <button type="button" class="palette-btn rounded-lg border border-gray-200 bg-gray-50 px-3 py-3 text-sm font-medium hover:border-primary hover:bg-blue-50" data-add-type="add-to-cart">加购</button>
            <button type="button" class="palette-btn rounded-lg border border-gray-200 bg-gray-50 px-3 py-3 text-sm font-medium hover:border-primary hover:bg-blue-50" data-add-type="gift-card">购买礼品卡</button>
            <button type="button" class="palette-btn rounded-lg border border-gray-200 bg-gray-50 px-3 py-3 text-sm font-medium hover:border-primary hover:bg-blue-50" data-add-type="cart">购物车</button>
            <button type="button" class="palette-btn rounded-lg border border-gray-200 bg-gray-50 px-3 py-3 text-sm font-medium hover:border-primary hover:bg-blue-50" data-add-type="skip">继续点单</button>
          </div>
          <p class="mt-3 text-xs leading-relaxed text-gray-500">点击组件添加到画布，拖拽调整位置；选中后在右侧配置绑定与尺寸。</p>
        </div>

        <div id="propsPanel" class="mt-4 hidden rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
          <div class="mb-3 flex items-center justify-between">
            <h2 class="text-sm font-semibold text-gray-900">组件属性</h2>
            <button type="button" id="deleteComponentBtn" class="text-xs text-red-600 hover:underline">删除组件</button>
          </div>
          <p id="propsTypeLabel" class="mb-3 text-xs text-gray-500"></p>

          <div id="propsImageBlock" class="mb-4 hidden">
            <p class="mb-2 text-xs font-medium text-gray-700">上传图片</p>
            <div class="flex items-center gap-3">
              <img id="propsImagePreview" alt="" class="h-10 w-10 rounded-full border border-gray-200 object-cover" />
              <label class="cursor-pointer text-sm text-primary hover:underline">
                更换
                <input type="file" id="propsImageInput" accept="image/*" class="hidden" />
              </label>
            </div>
          </div>

          <div id="propsDishBlock" class="mb-4 hidden">
            <label class="mb-1 block text-xs font-medium text-gray-700" for="propsDishSelect">绑定菜品</label>
            <select id="propsDishSelect" class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm"></select>
          </div>

          <div id="propsGiftBlock" class="mb-4 hidden">
            <label class="mb-1 block text-xs font-medium text-gray-700" for="propsGiftSelect">绑定礼品卡活动</label>
            <select id="propsGiftSelect" class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm"></select>
          </div>

          <div id="propsLabelBlock" class="mb-4 hidden">
            <label class="mb-1 block text-xs font-medium text-gray-700" for="propsLabelInput">按钮文案</label>
            <input type="text" id="propsLabelInput" class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm" />
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="mb-1 block text-xs text-gray-600" for="propW">宽</label>
              <div class="flex items-center gap-1">
                <input type="number" id="propW" class="w-full rounded-md border border-gray-300 px-2 py-1.5 text-sm tabular-nums" min="20" />
                <span class="text-xs text-gray-400">px</span>
              </div>
            </div>
            <div>
              <label class="mb-1 block text-xs text-gray-600" for="propH">高</label>
              <div class="flex items-center gap-1">
                <input type="number" id="propH" class="w-full rounded-md border border-gray-300 px-2 py-1.5 text-sm tabular-nums" min="20" />
                <span class="text-xs text-gray-400">px</span>
              </div>
            </div>
            <div>
              <label class="mb-1 block text-xs text-gray-600" for="propX">X</label>
              <input type="number" id="propX" class="w-full rounded-md border border-gray-300 px-2 py-1.5 text-sm tabular-nums" step="0.01" />
            </div>
            <div>
              <label class="mb-1 block text-xs text-gray-600" for="propY">Y</label>
              <input type="number" id="propY" class="w-full rounded-md border border-gray-300 px-2 py-1.5 text-sm tabular-nums" step="0.01" />
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="assets/marketing-poster-pro-store.js"></script>
  <script>
    (function () {
      var S = MarketingPosterProStore;
      var CW = S.CANVAS_WIDTH;
      var CH = S.CANVAS_HEIGHT;
      var state = S.readState();
      var selectedId = null;
      var drag = null;

      var canvasEl = document.getElementById("canvas");
      var componentsLayer = document.getElementById("componentsLayer");
      var bgImage = document.getElementById("bgImage");
      var bgPlaceholder = document.getElementById("bgPlaceholder");
      var propsPanel = document.getElementById("propsPanel");
      var palettePanel = document.getElementById("palettePanel");

      function scaleX() { return canvasEl.clientWidth / CW; }
      function scaleY() { return canvasEl.clientHeight / CH; }

      function escapeHtml(s) {
        return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function findComponent(id) {
        for (var i = 0; i < state.components.length; i++) {
          if (state.components[i].id === id) return state.components[i];
        }
        return null;
      }

      function typeLabel(type) {
        return ({ "add-to-cart": "加购", "gift-card": "购买礼品卡", cart: "购物车", skip: "继续点单" })[type] || type;
      }

      function renderBackground() {
        if (state.background && state.background.dataUrl) {
          bgImage.src = state.background.dataUrl;
          bgImage.classList.remove("hidden");
          bgPlaceholder.classList.add("hidden");
        } else {
          bgImage.classList.add("hidden");
          bgPlaceholder.classList.remove("hidden");
        }
      }

      function renderComponentEl(cmp) {
        var sx = scaleX();
        var sy = scaleY();
        var el = document.createElement("div");
        el.className = "poster-pro-component" + (cmp.id === selectedId ? " selected" : "");
        el.dataset.cmpId = cmp.id;
        el.style.left = (cmp.x * sx) + "px";
        el.style.top = (cmp.y * sy) + "px";
        el.style.width = (cmp.width * sx) + "px";
        el.style.height = (cmp.height * sy) + "px";

        if (cmp.type === "add-to-cart") {
          el.innerHTML = '<img src="' + escapeHtml(cmp.imageUrl) + '" alt="加购" class="h-full w-full object-contain pointer-events-none" draggable="false" />';
        } else if (cmp.type === "gift-card") {
          el.innerHTML = '<div class="flex h-full w-full items-center justify-center rounded-lg bg-brand px-1 text-center text-[10px] font-medium leading-tight text-gray-900 pointer-events-none">' + escapeHtml(cmp.label) + "</div>";
        } else if (cmp.type === "cart") {
          el.innerHTML =
            '<div class="relative h-full w-full pointer-events-none">' +
            '<div class="flex h-full w-full items-center justify-center rounded-lg bg-gray-900 text-white"><svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg></div>' +
            '<span class="absolute -right-1 -top-1 flex h-4 min-w-[1rem] items-center justify-center rounded-full bg-red-500 px-0.5 text-[10px] font-bold text-white">' +
            escapeHtml(String(cmp.demoCount)) +
            "</span></div>";
        } else if (cmp.type === "skip") {
          el.innerHTML = '<div class="flex h-full w-full items-center justify-center rounded-full bg-brand text-center text-xs font-semibold text-gray-900 pointer-events-none px-2">' + escapeHtml(cmp.label) + "</div>";
        }
        return el;
      }

      function renderComponents() {
        componentsLayer.innerHTML = "";
        state.components.forEach(function (cmp) {
          componentsLayer.appendChild(renderComponentEl(cmp));
        });
      }

      function renderAll() {
        document.getElementById("aspectLabel").textContent = state.aspectLabel;
        updateDeactivateBtn();
        renderBackground();
        renderComponents();
        if (selectedId) syncPropsPanel();
      }

      function updateDeactivateBtn() {
        var btn = document.getElementById("deactivateBtn");
        btn.textContent = state.active ? "停用" : "启用";
        btn.className = state.active
          ? "rounded-md border border-red-200 bg-white px-3 py-1.5 text-sm text-red-600 hover:bg-red-50"
          : "rounded-md border border-emerald-200 bg-white px-3 py-1.5 text-sm text-emerald-600 hover:bg-emerald-50";
      }

      function selectComponent(id) {
        selectedId = id;
        renderComponents();
        if (!id) {
          propsPanel.classList.add("hidden");
          palettePanel.classList.remove("hidden");
          return;
        }
        propsPanel.classList.remove("hidden");
        syncPropsPanel();
      }

      function syncPropsPanel() {
        var cmp = findComponent(selectedId);
        if (!cmp) return;
        document.getElementById("propsTypeLabel").textContent = "类型：" + typeLabel(cmp.type);

        var imgBlock = document.getElementById("propsImageBlock");
        var dishBlock = document.getElementById("propsDishBlock");
        var giftBlock = document.getElementById("propsGiftBlock");
        var labelBlock = document.getElementById("propsLabelBlock");

        imgBlock.classList.toggle("hidden", cmp.type !== "add-to-cart");
        dishBlock.classList.toggle("hidden", cmp.type !== "add-to-cart");
        giftBlock.classList.toggle("hidden", cmp.type !== "gift-card");
        labelBlock.classList.toggle("hidden", cmp.type !== "gift-card" && cmp.type !== "skip");

        if (cmp.type === "add-to-cart") {
          document.getElementById("propsImagePreview").src = cmp.imageUrl;
          var dishSel = document.getElementById("propsDishSelect");
          dishSel.innerHTML = S.MOCK_DISHES.map(function (d) {
            return '<option value="' + escapeHtml(d.id) + '"' + (d.id === cmp.dishId ? " selected" : "") + ">" + escapeHtml(d.name) + "</option>";
          }).join("");
        }
        if (cmp.type === "gift-card") {
          var giftSel = document.getElementById("propsGiftSelect");
          giftSel.innerHTML = S.MOCK_GIFT_ACTIVITIES.map(function (g) {
            return '<option value="' + escapeHtml(g.id) + '"' + (g.id === cmp.giftCardActivityId ? " selected" : "") + ">" + escapeHtml(g.name) + "</option>";
          }).join("");
          document.getElementById("propsLabelInput").value = cmp.label || "";
        }
        if (cmp.type === "skip") {
          document.getElementById("propsLabelInput").value = cmp.label || "";
        }

        document.getElementById("propW").value = String(cmp.width);
        document.getElementById("propH").value = String(cmp.height);
        document.getElementById("propX").value = String(Math.round(cmp.x * 100) / 100);
        document.getElementById("propY").value = String(Math.round(cmp.y * 100) / 100);
      }

      function applyPropsFromPanel() {
        var cmp = findComponent(selectedId);
        if (!cmp) return;
        cmp.width = Math.max(20, Number(document.getElementById("propW").value) || cmp.width);
        cmp.height = Math.max(20, Number(document.getElementById("propH").value) || cmp.height);
        cmp.x = Number(document.getElementById("propX").value) || 0;
        cmp.y = Number(document.getElementById("propY").value) || 0;
        if (cmp.type === "add-to-cart") {
          cmp.dishId = document.getElementById("propsDishSelect").value;
        }
        if (cmp.type === "gift-card") {
          cmp.giftCardActivityId = document.getElementById("propsGiftSelect").value;
          cmp.label = document.getElementById("propsLabelInput").value.trim() || "购买礼品卡";
        }
        if (cmp.type === "skip") {
          cmp.label = document.getElementById("propsLabelInput").value.trim() || "继续点单";
        }
        renderComponents();
      }

      function addComponent(type) {
        var defaults = {
          "add-to-cart": { w: 40, h: 40, x: CW / 2 - 20, y: CH / 2 - 20 },
          "gift-card": { w: 120, h: 36, x: 40, y: CH - 120 },
          cart: { w: 44, h: 44, x: CW - 60, y: CH - 80 },
          skip: { w: 140, h: 44, x: 40, y: CH - 80 },
        };
        var d = defaults[type] || defaults["add-to-cart"];
        var cmp = S.normalizeComponent({
          id: "cmp-" + Date.now(),
          type: type,
          x: d.x,
          y: d.y,
          width: d.w,
          height: d.h,
        });
        state.components.push(cmp);
        selectComponent(cmp.id);
        renderComponents();
      }

      document.querySelectorAll("[data-add-type]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          addComponent(btn.getAttribute("data-add-type"));
        });
      });

      canvasEl.addEventListener("mousedown", function (e) {
        var target = e.target.closest(".poster-pro-component");
        if (!target) {
          selectComponent(null);
          return;
        }
        var id = target.dataset.cmpId;
        var cmp = findComponent(id);
        if (!cmp) return;
        selectComponent(id);
        var rect = canvasEl.getBoundingClientRect();
        drag = {
          id: id,
          startX: e.clientX,
          startY: e.clientY,
          origX: cmp.x,
          origY: cmp.y,
        };
        e.preventDefault();
      });

      window.addEventListener("mousemove", function (e) {
        if (!drag) return;
        var cmp = findComponent(drag.id);
        if (!cmp) return;
        var sx = scaleX();
        var sy = scaleY();
        cmp.x = drag.origX + (e.clientX - drag.startX) / sx;
        cmp.y = drag.origY + (e.clientY - drag.startY) / sy;
        cmp.x = Math.max(0, Math.min(CW - cmp.width, cmp.x));
        cmp.y = Math.max(0, Math.min(CH - cmp.height, cmp.y));
        renderComponents();
        document.getElementById("propX").value = String(Math.round(cmp.x * 100) / 100);
        document.getElementById("propY").value = String(Math.round(cmp.y * 100) / 100);
      });

      window.addEventListener("mouseup", function () {
        drag = null;
      });

      ["propW", "propH", "propX", "propY", "propsDishSelect", "propsGiftSelect", "propsLabelInput"].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) {
          el.addEventListener("change", applyPropsFromPanel);
          el.addEventListener("input", applyPropsFromPanel);
        }
      });

      document.getElementById("propsImageInput").addEventListener("change", function (e) {
        var file = e.target.files && e.target.files[0];
        var cmp = findComponent(selectedId);
        if (!file || !cmp || cmp.type !== "add-to-cart") return;
        if (file.size > 4 * 1024 * 1024) {
          window.alert("图片不能超过 4M");
          return;
        }
        var reader = new FileReader();
        reader.onload = function () {
          cmp.imageUrl = String(reader.result);
          document.getElementById("propsImagePreview").src = cmp.imageUrl;
          renderComponents();
        };
        reader.readAsDataURL(file);
      });

      document.getElementById("deleteComponentBtn").addEventListener("click", function () {
        if (!selectedId) return;
        state.components = state.components.filter(function (c) { return c.id !== selectedId; });
        selectComponent(null);
        renderComponents();
      });

      document.getElementById("bgInput").addEventListener("change", function (e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        if (file.size > 4 * 1024 * 1024) {
          window.alert("背景图不能超过 4M");
          return;
        }
        var reader = new FileReader();
        reader.onload = function () {
          var img = new Image();
          img.onload = function () {
            state.background = {
              dataUrl: String(reader.result),
              fileName: file.name,
              width: img.naturalWidth,
              height: img.naturalHeight,
            };
            renderBackground();
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });

      document.getElementById("saveBtn").addEventListener("click", function () {
        applyPropsFromPanel();
        S.writeState(state);
        window.alert("海报 Pro 配置已保存");
      });

      document.getElementById("deactivateBtn").addEventListener("click", function () {
        state.active = !state.active;
        updateDeactivateBtn();
        S.writeState(state);
      });

      var backLink = document.getElementById("backLink");
      if (backLink) {
        var embedded = new URLSearchParams(location.search).get("embedded");
        if (embedded === "1" || embedded === "true") {
          backLink.href = "marketing-ads-list.html?embedded=1";
        }
      }

      window.addEventListener("resize", renderComponents);
      renderAll();
    })();
  </script>
</body>
</html>
