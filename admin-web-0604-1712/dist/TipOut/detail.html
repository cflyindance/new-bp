<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小费分配明细 - TipOut</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .formula-section { margin-bottom: 24px; }
    .formula-display {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 16px 0; font-size: 14px;
    }
    .formula-block {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      min-width: 60px;
    }
    .formula-block .val { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .formula-block .lbl { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; }
    .formula-block input.formula-input {
      width: 90px; height: 32px; padding: 4px 8px; border: 1px solid var(--border-color);
      border-radius: var(--radius-md); font-size: 14px; text-align: center; font-weight: 600;
    }
    .formula-block input.formula-input:focus {
      border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(22,119,255,0.1);
    }
    .formula-block input.formula-pct { width: 56px; }
    .formula-operator { font-size: 18px; font-weight: 500; color: var(--text-secondary); padding: 0 4px; }
    .formula-display .formula-link { margin-left: auto; align-self: center; }
    .detail-card { margin-bottom: 16px; }
    .detail-table { width: 100%; border-collapse: collapse; }
    .detail-table th {
      background: rgba(0,0,0,0.02); padding: 10px 12px; text-align: left;
      border-bottom: 1px solid var(--border-light); font-weight: 500; font-size: 13px;
      white-space: nowrap;
    }
    .detail-table td {
      padding: 10px 12px; border-bottom: 1px solid var(--border-light); font-size: 13px;
      vertical-align: middle;
    }
    .detail-table .input-cell input {
      width: 60px; height: 28px; padding: 2px 8px; border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); font-size: 13px; text-align: center;
    }
    .detail-table .input-cell input:focus {
      border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(22,119,255,0.1);
    }
    .detail-table .action-cell { white-space: nowrap; }
    .detail-table .action-cell a {
      color: var(--primary); cursor: pointer; text-decoration: none; margin-right: 8px; font-size: 13px;
    }
    .detail-table .action-cell a.danger { color: var(--danger); }
    .bottom-actions {
      position: fixed; bottom: 0; right: 0; left: 264px; z-index: 40;
      display: flex; justify-content: flex-end; gap: 12px; padding: 12px 24px;
      background: #fff; border-top: 1px solid var(--border-light);
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    }
    .content-area { padding-bottom: 72px; }
    @media (max-width: 768px) {
      .bottom-actions { left: 0; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 10px 12px; }
      .bottom-actions .btn { flex: 1 1 auto; min-width: calc(50% - 8px); min-height: 44px; font-size: 14px; }
      .bottom-actions .btn-lg { padding-left: 12px; padding-right: 12px; }
    }
    .role-label { display: inline-block; padding: 2px 8px; background: #f5f5f5; border-radius: 4px; font-size: 12px; }

    /* Formula detail modal */
    .rule-detail-item { margin-bottom: 12px; }
    .rule-detail-item .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .rule-detail-item .value { font-size: 14px; color: var(--text-primary); white-space: pre-line; }
    .detail-rule-bundle {
      margin-bottom: 24px;
      padding: 18px 20px 20px;
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .detail-rule-bundle .formula-rule-section {
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-light);
    }
    .detail-rule-bundle .detail-card {
      margin-bottom: 0;
      border: none;
      box-shadow: none;
    }
    .detail-rule-bundle .detail-card .card-body {
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
    }
    .formula-rule-section { margin-bottom: 28px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); }
    .formula-rule-section:last-child { border-bottom: none; margin-bottom: 8px; }
    .detail-rule-block-title { margin: 0 0 6px; font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .detail-rule-meta { font-size: 12px; color: var(--text-tertiary); margin: 0 0 10px; }
    /* 对齐小费分配页「分配结果」：角色摘要 + 可折叠员工表 */
    .detail-card-body-alloc .employee-section {
      margin-bottom: 20px;
      overflow-x: auto;
      width: 100%;
    }
    .detail-card-body-alloc .employee-section:last-child { margin-bottom: 0; }
    .detail-card-body-alloc .employee-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }
    .detail-card-body-alloc .employee-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .detail-card-body-alloc .fold-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }
    .detail-card-body-alloc .fold-btn:hover { color: var(--primary); }
    .detail-card-body-alloc .employee-detail {
      overflow: hidden;
      transition: max-height 0.3s ease;
      max-height: 2000px;
    }
    .detail-card-body-alloc .detail-role-summary-row .input-cell input {
      width: 64px;
      height: 28px;
      padding: 2px 8px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 13px;
      text-align: center;
    }
    .detail-card-body-alloc .data-table { width: 100%; table-layout: fixed; }
    .detail-card-body-alloc .data-table th,
    .detail-card-body-alloc .data-table td {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* 桌面端：仅日期+门店两项，勿横向拉伸产生过大空隙 */
    @media (min-width: 769px) {
      .filter-bar--detail {
        gap: 10px;
      }
      .filter-bar--detail .filter-field {
        flex: 0 0 auto;
        max-width: none;
        min-width: 0;
      }
      .filter-bar--detail .filter-field:first-child {
        width: 200px;
        max-width: 200px;
      }
      .filter-bar--detail .filter-field:nth-child(2) {
        width: 280px;
        max-width: 280px;
      }
    }
  </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">M</div>
        <span class="logo-text">MenuSifu</span>

      <nav class="sidebar-menu">

        </div>
        <div class="sidebar-submenu-items" style="max-height:200px">
          <a href="index.html" class="sidebar-menu-item active">小费分配</a>
        </div>
        <div class="sidebar-submenu-title open" onclick="this.classList.toggle('open');this.nextElementSibling.style.maxHeight=this.classList.contains('open')?'200px':'0'">
          <span>员工管理</span>
          <svg class="arrow" width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 8.825a.5.5 0 0 1-.354-.146l-4-4a.5.5 0 0 1 .708-.708L6 7.617l3.646-3.646a.5.5 0 0 1 .708.708l-4 4A.5.5 0 0 1 6 8.825z"/></svg>
        </div>

          <a href="employees.html" class="sidebar-menu-item">员工列表</a>
        </div>
        <div class="sidebar-submenu-title open" onclick="this.classList.toggle('open');this.nextElementSibling.style.maxHeight=this.classList.contains('open')?'200px':'0'">
          <span>Payroll</span>
          <svg class="arrow" width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 8.825a.5.5 0 0 1-.354-.146l-4-4a.5.5 0 0 1 .708-.708L6 7.617l3.646-3.646a.5.5 0 0 1 .708.708l-4 4A.5.5 0 0 1 6 8.825z"/></svg>
        </div>

    <div class="mobile-overlay"></div>

    <div class="main-content">
      <header class="header">
        <div class="header-left">
          <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
        </div>
        <div class="header-right">
          <div class="header-user">
            <div class="avatar">R</div>
            <span>Robert_W</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 8.825a.5.5 0 0 1-.354-.146l-4-4a.5.5 0 0 1 .708-.708L6 7.617l3.646-3.646a.5.5 0 0 1 .708.708l-4 4A.5.5 0 0 1 6 8.825z"/></svg>
          </div>
        </div>
      </header>

      <div class="page-tabs">
        <a href="index.html" class="page-tab">小费分配</a>
        <a href="detail.html" class="page-tab active">小费分配明细</a>
        <a href="rules.html" class="page-tab">小费分配规则</a>
      </div>

      <div class="content-area">
        <!-- Filters：移动端默认折叠，与分配页一致 -->
        <div class="filter-surface">
          <button type="button" class="filter-surface-toggle" onclick="toggleFilterSurface(this)" aria-expanded="false" aria-controls="detailFilterCollapsible">
            <span class="filter-surface-toggle-text">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M4 6h16M7 12h10M10 18h4"/></svg>

          </button>

                <label class="filter-field-label" for="detailDate">日期</label>
                <input type="date" id="detailDate" class="form-control form-control-lg filter-input-date" value="2026-01-03" onchange="renderDetailPage()">

      <div class="bottom-actions">

        <button class="btn btn-primary btn-lg" onclick="saveAndNext()">保存并跳转到下一天</button>

  <!-- Formula Detail Modal -->
  <div class="modal-overlay" id="formulaModal">
    <div class="modal" style="width:600px">
      <div class="modal-header">
        <h3>公式详情 — 小费分配规则</h3>
        <button class="modal-close" onclick="closeModal('formulaModal')">×</button>
      </div>
      <div class="modal-body" id="formulaModalBody">
        <div style="padding:24px;color:var(--text-secondary);text-align:center">加载中…</div>
      </div>

        <button class="btn" onclick="closeModal('formulaModal')">关闭</button>
      </div>
    </div>

  <script src="common.js"></script>
  <script src="ruleData.js"></script>
  <script src="tipAllocation.js"></script>
  <script>
    var ALLOC_KEY = 'tipout_allocated';
    function getAllocatedDatesForStore(store) {
      try {
        var raw = localStorage.getItem(ALLOC_KEY);
        var obj = raw ? JSON.parse(raw) : {};
        var arr = obj[store];
        if (!arr && store) {
          var namePart = (store.split('-')[0] || '').trim();
          if (namePart) {
            for (var k in obj) {
              if (k.indexOf(namePart) === 0 || namePart.indexOf(k.split('-')[0].trim()) === 0) {
                arr = obj[k]; break;
              }
            }
          }
        }
        return new Set(arr || []);
      } catch (e) { return new Set(); }
    }

    const roleEmployees = {
      'Server':    ['Maria Garcia', 'Jason Chen', 'Emily Watson', 'Diego Ramirez'],
      'Bartender': ['Mike Johnson', 'Sarah Kim'],
      'Kitchen':   ['Tom Wilson', 'Amy Liu'],
      'Busser':    ['Carlos Lopez', 'Tyler Brown'],
      'Cashier':   ['Linda Nguyen', 'Amy Zhang'],
      'Host':      ['Rachel Scott', 'Kevin Park'],
      'Runner':    ['Daniel Ortiz', 'Chris Lee'],
      'Shift Lead':['Jessica Martinez']
    };

    var currentRule = null;

    function seedRandom(seed) {
      var s = seed;
      return function() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function money(v) { return '$' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

    function escHtml(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function detailRuleDomId(rule, idx) {
      if (rule && rule.id != null && rule.id !== '') return String(rule.id);
      return 'i' + idx;
    }

    function detailSafeTableId(rid) {
      return 'detailTable_' + String(rid).replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    function genDayData(dateKey, poolRules, ruleSalt) {
      var parts = dateKey.split('-');
      var extra = 0;
      if (ruleSalt != null && ruleSalt !== '') {
        var rs = String(ruleSalt);
        for (var si = 0; si < rs.length; si++) extra = (extra * 31 + rs.charCodeAt(si)) % 100000;
      }
      var seed = parts.reduce(function(a, b) { return a * 31 + parseInt(b, 10); }, 0) + extra;
      var rng = seedRandom(seed);
      var dow = new Date(dateKey + 'T00:00:00').getDay();
      var wb = (dow === 5 || dow === 6) ? 1.4 : 1.0;
      var sales = +((3800 + rng() * 4400) * wb).toFixed(2);
      var tips = +((650 + rng() * 700) * wb).toFixed(2);
      var surcharge = +((120 + rng() * 180) * wb).toFixed(2);
      var manual = +((80 + rng() * 170) * wb).toFixed(2);
      var custom = 0;
      var pool = 0;
      var poolByRule = {};
      var salesCount = 0, tipsCount = 0, surchargeCount = 0;
      (poolRules || []).forEach(function(pr) {
        if (pr.type === 'sales') salesCount++;
        else if (pr.type === 'tips') tipsCount++;
        else if (pr.type === 'surcharge') surchargeCount++;
      });
      (poolRules || []).forEach(function(pr) {
        var base = 0;
        if (pr.type === 'sales') base = salesCount > 0 ? sales / salesCount : sales;
        else if (pr.type === 'tips') base = tipsCount > 0 ? tips / tipsCount : tips;
        else if (pr.type === 'surcharge') base = surchargeCount > 0 ? surcharge / surchargeCount : surcharge;
        else if (pr.type === 'manual') base = manual;
        else if (pr.type === 'custom') base = pr.amount != null ? pr.amount : custom;
        var ruleAmt = +(base * (pr.pct != null ? pr.pct : 0) / 100).toFixed(2);
        var rid = pr.id || pr.type;
        poolByRule[rid] = ruleAmt;
        pool += ruleAmt;
      });
      pool = +pool.toFixed(2);
      var poolBaseByRule = {};
      (poolRules || []).forEach(function(pr) {
        var rid = pr.id || pr.type;
        var amt = poolByRule[rid] || 0;
        var p = pr.pct != null ? pr.pct : 0;
        poolBaseByRule[rid] = p > 0 ? +(amt * 100 / p).toFixed(2) : 0;
      });
      return { sales: sales, tips: tips, surcharge: surcharge, manual: manual, custom: custom, pool: pool, poolRules: poolRules, poolByRule: poolByRule, poolBaseByRule: poolBaseByRule };
    }

    function renderDetailPage() {
      var dateKey = document.getElementById('detailDate').value;
      var storeSel = document.getElementById('storeSelect');
      var store = storeSel ? storeSel.value || '' : '';
      if (!dateKey) return;

      var rules = window.ruleData && ruleData.getRulesForStore ? ruleData.getRulesForStore(store) : [];
      if (rules.length === 0) {
        document.getElementById('detailRulesContainer').innerHTML =
          '<div style="padding:48px;text-align:center;color:var(--text-secondary);font-size:14px">' +
          '<p style="margin-bottom:16px">请先创建小费分配规则</p>' +
          '<a href="rules.html" class="btn btn-primary">去创建规则</a></div>';
        currentRule = null;
        return;
      }

      var allocatedDates = getAllocatedDatesForStore(store);
      if (!allocatedDates.has(dateKey)) {
        document.getElementById('detailRulesContainer').innerHTML =
          '<div style="padding:48px;text-align:center;color:var(--text-secondary);font-size:14px">' +
          '<p style="margin-bottom:16px">该日期尚未完成小费分配，请先在小费分配页面完成分配</p>' +
          '<a href="index.html" class="btn btn-primary">去分配小费</a></div>';
        currentRule = null;
        return;
      }

      currentRule = rules[0];
      var bundleParts = [];
      rules.forEach(function(rule, idx) {
        var rid = detailRuleDomId(rule, idx);
        var tableId = detailSafeTableId(rid);
        var topHtml = '';
        var cardHtml = '';
        if ((rule.allocationMode || 'legacy_pool') === 'order_tip_then_residual' && window.TipAllocation) {
          var otCtx = genSyntheticOrderTipContext(dateKey, rid);
          var otResult = TipAllocation.allocateOrderTipResidual(rule, otCtx);
          topHtml = buildOrderTipFormulaSectionHtml(otResult, rule, otCtx.lines, otCtx.tipByType, rid);
          cardHtml = buildOrderTipDetailCardHtml(otResult, dateKey, rule, rid, tableId);
        } else {
          var poolRules = rule.poolRules || [];
          var data = genDayData(dateKey, poolRules, rid);
          topHtml = buildLegacyFormulaSectionHtml(data, rule, rid);
          cardHtml = buildLegacyDetailCardHtml(data, dateKey, rule, rid, tableId);
        }
        bundleParts.push(
          '<div class="detail-rule-bundle" data-rule-id="' + escHtml(rid) + '">' + topHtml + cardHtml + '</div>'
        );
      });
      document.getElementById('detailRulesContainer').innerHTML = bundleParts.join('');
    }

    function genSyntheticOrderTipContext(dateKey, ruleSalt) {
      var parts = dateKey.split('-');
      var extra = 0;
      if (ruleSalt != null && ruleSalt !== '') {
        for (var si = 0; si < String(ruleSalt).length; si++) extra = (extra * 37 + String(ruleSalt).charCodeAt(si)) % 100000;
      }
      var seed = parts.reduce(function(a, b) { return a * 31 + parseInt(b, 10); }, 0) + 29 + extra;
      var rng = seedRandom(seed);
      var dow = new Date(dateKey + 'T00:00:00').getDay();
      var wb = (dow === 5 || dow === 6) ? 1.35 : 1.0;
      var bev = +((95 + rng() * 30) * wb).toFixed(2);
      var food = +((185 + rng() * 50) * wb).toFixed(2);
      var cc = +((55 + rng() * 90) * wb).toFixed(2);
      var cash = +((15 + rng() * 35) * wb).toFixed(2);
      var lines = [
        { productLine: 'POS', category: '酒水', amount: bev },
        { productLine: 'POS', category: '主菜', amount: food }
      ];
      var tipByType = {
        'Credit Card Tips (信用卡小费)': cc,
        'Cash Tips (现金小费)': cash
      };
      var surcharge = +((22 + rng() * 18) * wb).toFixed(2);
      var manual = +((8 + rng() * 12) * wb).toFixed(2);
      return { lines: lines, tipByType: tipByType, surcharge: surcharge, manual: manual };
    }

    function buildOrderTipFormulaSectionHtml(otResult, rule, lines, tipByType, rid) {
      var esc = function(s) {
        return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      };
      var claimRows = (otResult.claimResults || []).map(function(c) {
        return '<div class="rule-detail-item"><div class="label">' + esc(c.name || c.id) + '</div><div class="value">销售额基数 ' + c.base.toFixed(2) + ' × ' + c.pct + '% → 计提 ' + c.claimed.toFixed(2) + '，从订单小费实付 ' + c.paid.toFixed(2) + '</div></div>';
      }).join('');
      var lineStr = (lines || []).map(function(l) {
        return esc(l.productLine) + '/' + esc(l.category) + ' $' + Number(l.amount).toFixed(2);
      }).join('；');
      var tipStr = '';
      if (tipByType && typeof tipByType === 'object') {
        tipStr = Object.keys(tipByType).map(function(k) {
          return esc(k) + ' $' + Number(tipByType[k]).toFixed(2);
        }).join('；');
      }
      var poolNote = (rule.poolRules && rule.poolRules.length)
        ? '<p style="font-size:12px;color:var(--text-tertiary);margin:4px 0 0;line-height:1.5">订单小费钱包 = 按「小费池计算规则」对单笔订单基数（销售额/小费/加收/手动/自定义等）加权合计，口径与「小费池汇总分配」一致。</p>'
        : '';
      var safeRidJs = String(rid).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      return '<div class="formula-rule-section" data-rule-id="' + escHtml(rid) + '">' +
        '<h4 class="detail-rule-block-title">' + escHtml(rule.ruleName || '未命名规则') + '</h4>' +
        '<p class="detail-rule-meta">计提小费占比分配（模拟单笔订单）</p>' +

        return;
      }
      var poolTypeNames = (window.ruleData && ruleData.poolTypeNames) || { sales: '销售额', tips: '小费', surcharge: '加收服务费', manual: '手动上报小费', custom: '自定义小费' };
      var distNames = (window.ruleData && ruleData.distNames) || { average: '按员工数量平均分配', hours: '按工作时长占比分配', orders: '按订单占比分配' };
      var store = document.getElementById('storeSelect');
      var storeVal = store ? store.value : rule.store || '';
      var html = '<div class="rule-detail-item"><div class="label">规则名称</div><div class="value">' + (rule.ruleName || '') + '</div></div>' +
        '<div class="rule-detail-item"><div class="label">门店</div><div class="value">' + (storeVal || rule.store || '') + '</div></div>' +
        '<div class="divider"></div><h4 style="margin-bottom:12px;font-size:14px">小费池计算规则</h4>';
      var poolRuleNames = {};
      (rule.poolRules || []).forEach(function(pr) {
        poolRuleNames[pr.id || pr.type] = pr.name || poolTypeNames[pr.type] || pr.type;
      });
      (rule.poolRules || []).forEach(function(pr) {
        var name = pr.name || poolTypeNames[pr.type] || pr.type;
        var valStr = '';
        if (pr.type === 'custom') {
          valStr = '金额 $' + (pr.amount != null ? pr.amount : 0) + ' | 占比 ' + (pr.pct != null ? pr.pct : 100) + '%';
        } else {
          valStr = '占比 ' + (pr.pct || 0) + '%';
          var cond = pr.conditions || (pr.type === 'sales' && rule.salesConditions) || (pr.type === 'tips' && rule.tipsConditions) || (pr.type === 'surcharge' && rule.surchargeConditions);
          if (cond && (pr.type === 'surcharge' || pr.type === 'tips')) valStr += ' | ' + formatSurchargeConditions(cond);
          else if (cond && typeof cond === 'object' && Object.keys(cond).length) valStr += ' | ' + formatConditions(cond, true);
        }
        html += '<div class="rule-detail-item"><div class="label">' + name + '</div><div class="value">' + valStr + '</div></div>';
      });
      html += '<div class="divider"></div><h4 style="margin-bottom:12px;font-size:14px">小费扣除方规则</h4>' +
        '<div class="rule-detail-item"><div class="value">' + formatDeductRulesDisplay(rule) + '</div></div>' +
        '<div class="divider"></div><h4 style="margin-bottom:12px;font-size:14px">小费接收方规则</h4>';
      (rule.receivers || []).forEach(function(r) {
        html += '<div class="rule-detail-item"><div class="value">' + ((r.roles || []).join(' / ') || '') + ' ' + (r.pct || 0) + '%</div></div>';
        (r.subReceivers || []).forEach(function(sr) {
          html += '<div class="rule-detail-item" style="padding-left:16px"><div class="value" style="font-size:13px;color:var(--text-tertiary)">└ 再分配：' + ((sr.roles || []).join(' / ') || '') + ' ' + (sr.pct || 0) + '%</div></div>';
        });
      });
      html += '<div class="rule-detail-item"><div class="label">小费分配方式</div><div class="value">' + (distNames[rule.distribution] || rule.distribution || '—') + '</div></div>';
      body.innerHTML = html;
    }

    var poolTypeNames = { sales: '销售额', tips: '小费', surcharge: '加收服务费', manual: '手动上报小费', custom: '自定义小费' };

    function openFormulaRuleModal(rid) {
      var storeSel = document.getElementById('storeSelect');
      var store = storeSel ? storeSel.value || '' : '';
      var list = window.ruleData && ruleData.getRulesForStore ? ruleData.getRulesForStore(store) : [];
      var found = null;
      list.forEach(function(r, idx) {
        if (found) return;
        if (String(detailRuleDomId(r, idx)) === String(rid)) found = r;
      });
      if (!found) return;
      populateFormulaModal(found);
      openModal('formulaModal');
    }

    function recalcFormulaPoolForBlock(section) {
      if (!section) return 0;
      var inputs = section.querySelectorAll('input.formula-input[data-type="amount"]');
      var pool = 0;
      inputs.forEach(function(inp) {
        var idx = inp.getAttribute('data-idx');
        var pctInp = section.querySelector('input.formula-input[data-type="pct"][data-idx="' + idx + '"]');
        var amt = parseFloat(String(inp.value).replace(/[^0-9.-]/g, '')) || 0;
        var pct = parseFloat(String(pctInp ? pctInp.value : 0).replace(/[^0-9.-]/g, '')) || 0;
        pool += amt * pct / 100;
      });
      pool = +pool.toFixed(2);
      var poolEl = section.querySelector('.formula-pool-val');
      if (poolEl) poolEl.textContent = money(pool);
      var bundle = section.closest('.detail-rule-bundle');
      var ruleRid = section.getAttribute('data-rule-id');
      if (bundle) {
        var card = bundle.querySelector('.detail-card');
        if (card) {
          card.setAttribute('data-pool', pool);
          if (!card.getAttribute('data-order-tip-mode')) recalcDetailLegacyCard(card);
        }
      } else if (ruleRid) {
        var escSel = (typeof CSS !== 'undefined' && CSS.escape) ? CSS.escape(ruleRid) : String(ruleRid).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
        var card = document.querySelector('#detailRulesContainer .detail-card[data-rule-id="' + escSel + '"]');
        if (card) {
          card.setAttribute('data-pool', pool);
          if (!card.getAttribute('data-order-tip-mode')) recalcDetailLegacyCard(card);
        }
      }
      return pool;
    }

    function recalcFormulaPool() {
      var root = document.getElementById('detailRulesContainer');
      if (!root) return 0;
      var sections = root.querySelectorAll('.formula-rule-section');
      if (sections.length) {
        sections.forEach(function(sec) { recalcFormulaPoolForBlock(sec); });
        return 0;
      }
      return recalcFormulaPoolForBlock(root);
    }

    function buildLegacyFormulaSectionHtml(data, rule, rid) {
      var poolRules = (rule && rule.poolRules) || (data && data.poolRules) || [];
      var blocks = [];
      var poolBaseByRule = data.poolBaseByRule || {};
      var safeRidJs = String(rid).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      var recalcEv = 'onchange="recalcFormulaPoolForBlock(this.closest(\'.formula-rule-section\'))" oninput="recalcFormulaPoolForBlock(this.closest(\'.formula-rule-section\'))"';
      poolRules.forEach(function(pr, i) {
        var prid = pr.id || pr.type;
        var base = poolBaseByRule[prid];
        if (base == null) {
          if (pr.type === 'sales') base = data.sales || 0;
          else if (pr.type === 'tips') base = data.tips || 0;
          else if (pr.type === 'surcharge') base = data.surcharge || 0;
          else if (pr.type === 'manual') base = data.manual || 0;
          else if (pr.type === 'custom') base = pr.amount != null ? pr.amount : (data.custom || 0);
        }
        var lbl = pr.name || (ruleData && ruleData.poolTypeNames && ruleData.poolTypeNames[pr.type]) || poolTypeNames[pr.type] || pr.type;
        var baseStr = typeof base === 'number' ? base.toFixed(2) : String(base || '0');
        var pctVal = pr.pct != null ? pr.pct : 0;
        if (i > 0) blocks.push('<span class="formula-operator">+</span>');
        blocks.push(
          '<div class="formula-block">' +
            '<span class="lbl">' + escHtml(lbl) + '</span>' +
            '<input type="text" class="formula-input" data-type="amount" data-idx="' + i + '" value="' + baseStr + '" placeholder="0" ' + recalcEv + '>' +
          '</div>' +
          '<span class="formula-operator">×</span>' +
          '<div class="formula-block">' +
            '<span class="lbl">占比</span>' +
            '<input type="number" class="formula-input formula-pct" data-type="pct" data-idx="' + i + '" value="' + pctVal + '" placeholder="0" min="0" max="100" step="0.1" ' + recalcEv + '>' +
          '</div>'
        );
      });
      var formulaHtml = blocks.length ? blocks.join('') : '<div class="formula-block"><span class="val">$0.00</span><span class="lbl">暂无池规则</span></div>';
      return '<div class="formula-rule-section formula-section" data-rule-id="' + escHtml(rid) + '">' +
        '<h4 class="detail-rule-block-title">' + escHtml(rule.ruleName || '未命名规则') + '</h4>' +
        '<p class="detail-rule-meta">小费池汇总分配</p>' +
        '<div class="formula-display">' +
          '<div class="formula-block"><span class="lbl">小费池总金额</span><span class="val formula-pool-val">' + money(data.pool || 0) + '</span></div>' +
          '<span class="formula-operator">=</span>' + formulaHtml +
          '<div class="formula-link"><a href="javascript:void(0)" class="btn-link" onclick="openFormulaRuleModal(\'' + safeRidJs + '\')" style="font-size:14px">公式详情</a></div>' +
        '</div></div>';
    }

    function buildRoleConfigFromRule(rule) {
      var config = [];
      (rule.receivers || []).forEach(function(r) {
        var roles = r.roles || [];
        var roleLabel = roles.join(' / ');
        var employees = [];
        roles.forEach(function(role) {
          (roleEmployees[role] || []).forEach(function(emp) {
            if (employees.indexOf(emp) === -1) employees.push(emp);
          });
        });
        if (roleLabel) config.push({ role: roleLabel, roles: roles, pct: r.pct || 0, employees: employees });
      });
      return config;
    }

    function detailAttrSafe(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    }

    function toggleDetailFold(sectionId) {
      var section = document.getElementById(sectionId);
      if (!section) return;
      var detail = section.querySelector('.employee-detail');
      var btn = section.querySelector('.fold-btn span');
      if (!detail || !btn) return;
      if (detail.style.maxHeight === '0px') {
        detail.style.maxHeight = '2000px';
        btn.textContent = '收起';
      } else {
        detail.style.maxHeight = '0px';
        btn.textContent = '展开';
      }
    }

    function recalcDetailLegacyCard(card) {
      if (!card || card.getAttribute('data-order-tip-mode') === '1') return;
      var pool = parseFloat(card.getAttribute('data-pool')) || 0;
      card.querySelectorAll('.detail-result-section[data-role]').forEach(function(section) {
        var pctInp = section.querySelector('.detail-role-pct-input');
        var amtEl = section.querySelector('.role-amount');
        var pct = pctInp ? (parseFloat(pctInp.value) || 0) : 0;
        var roleAmt = +(pool * pct / 100).toFixed(2);
        if (amtEl) amtEl.textContent = money(roleAmt);
        var table = section.querySelector('table.detail-employee-table');
        if (!table) return;
        var empPctSum = 0;
        table.querySelectorAll('tbody tr').forEach(function(tr) {
          var ic = tr.querySelector('td.input-cell input');
          if (ic) empPctSum += parseFloat(ic.value) || 0;
        });
        table.querySelectorAll('tbody tr').forEach(function(tr) {
          var inputCell = tr.querySelector('td.input-cell');
          var empInp = inputCell ? inputCell.querySelector('input') : null;
          var amtCell = inputCell && inputCell.nextElementSibling;
          var empPct = empInp ? (parseFloat(empInp.value) || 0) : 0;
          var empAmt = empPctSum > 0 ? +(roleAmt * empPct / empPctSum).toFixed(2) : 0;
          if (amtCell) amtCell.textContent = money(empAmt);
        });
      });
    }

    function buildLegacyDetailCardHtml(data, dateKey, rule, rid, tableId) {
      var roleConfig = buildRoleConfigFromRule(rule);
      if (roleConfig.length === 0) {
        return '<div class="card detail-card" data-rule-id="' + escHtml(rid) + '" data-pool="0">' +
          '<div class="card-body" style="padding:24px;color:var(--text-secondary)">该规则暂无接收方配置</div></div>';
      }
      var seed = dateKey.split('-').reduce(function(a, b) { return a * 31 + parseInt(b, 10); }, 7);
      var rs = String(rid);
      for (var sj = 0; sj < rs.length; sj++) seed = (seed * 31 + rs.charCodeAt(sj)) % 2000000000;
      var rng = seedRandom(seed);
      var ridSafe = String(rid).replace(/[^a-zA-Z0-9_-]/g, '_');
      var html = '<div class="card detail-card" data-rule-id="' + escHtml(rid) + '" data-pool="' + (+data.pool || 0) + '">' +
        '<div class="card-body detail-card-body-alloc" style="padding:16px">';

      roleConfig.forEach(function(rc, ri) {
        var subTableId = tableId + '_r' + ri;
        var tidJs = String(subTableId).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        var sectionId = 'detailRoleSec_' + ridSafe + '_r' + ri;
        var sectionIdJs = String(sectionId).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        var poolAmt = data.pool || 0;
        var roleAmount = +(poolAmt * rc.pct / 100).toFixed(2);
        var empCount = rc.employees.length;
        var empPcts = [];
        var remaining = 100;
        for (var i = 0; i < empCount; i++) {
          if (i < empCount - 1) {
            var p = Math.round((100 / empCount) + (rng() - 0.5) * 10);
            p = Math.max(5, Math.min(remaining - (empCount - i - 1) * 5, p));
            empPcts.push(p);
            remaining -= p;
          } else {
            empPcts.push(remaining);
          }
        }

        html += '<div class="employee-section detail-result-section" id="' + escHtml(sectionId) + '" data-role="' + detailAttrSafe(rc.role) + '">' +
          '<div class="employee-header detail-result-header">' +
          '<span class="employee-name">' + escHtml(rc.role) + '</span>' +
          '<span class="tag" style="font-size:12px;padding:2px 8px">接收方</span>' +
          '<button type="button" class="fold-btn" onclick="toggleDetailFold(\'' + sectionIdJs + '\')">' +
          '<span>收起</span>' +
          '<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 3.175a.5.5 0 0 1 .354.146l4 4a.5.5 0 0 1-.708.708L6 4.383 2.354 8.029a.5.5 0 0 1-.708-.708l4-4A.5.5 0 0 1 6 3.175z"/></svg>' +
          '</button></div>' +
          '<div class="summary-row detail-role-summary-row" style="margin-bottom:12px">' +
          '<span>角色分配比例：<span class="input-cell" style="display:inline-block;vertical-align:middle">' +
          '<input type="number" class="detail-role-pct-input" value="' + rc.pct + '" step="0.1" min="0" max="100" onchange="recalcRoleAmount(\'' + tidJs + '\')"> %</span></span>' +
          '<span>角色分配金额：<strong class="role-amount">' + money(roleAmount) + '</strong></span>' +
          '</div>' +
          '<div class="employee-detail detail-employee-wrap">' +
          '<table class="data-table detail-table detail-employee-table" id="' + escHtml(subTableId) + '">' +
          '<thead><tr><th>分配员工</th><th>员工分配比例</th><th>员工分配金额</th><th>操作</th></tr></thead><tbody>';

        rc.employees.forEach(function(emp, ei) {
          var empAmount = +(roleAmount * empPcts[ei] / 100).toFixed(2);
          var opts = rc.employees.map(function(e) {
            return '<option' + (e === emp ? ' selected' : '') + '>' + e + '</option>';
          }).join('');
          html += '<tr>' +
            '<td><select class="form-control" style="width:140px;height:28px;font-size:13px">' + opts + '</select></td>' +
            '<td class="input-cell"><input type="number" value="' + empPcts[ei] + '" onchange="recalcRoleAmount(\'' + tidJs + '\')"> %</td>' +
            '<td>' + money(empAmount) + '</td>' +
            '<td class="action-cell">' +
            '<a href="javascript:void(0)" onclick="addDetailRow(\'' + tidJs + '\',this)">新增行</a>' +
            '<a href="javascript:void(0)" class="danger" onclick="removeDetailRow(\'' + tidJs + '\',this)">删除行</a></td>' +
            '</tr>';
        });

        html += '</tbody></table></div></div>';
      });

      html += '</div></div>';
      return html;
    }

    function getRoleFromRow(row) {
      var sec = row.closest('.detail-result-section');
      if (sec && sec.getAttribute('data-role')) return sec.getAttribute('data-role');
      return row.getAttribute('data-role');
    }

    function getLastRowOfRole(tableId, role) {
      var table = document.getElementById(tableId);
      if (!table) return null;
      var rows = table.querySelectorAll('tbody tr');
      return rows.length ? rows[rows.length - 1] : null;
    }

    function getSelectedEmployeesInRole(tableId, role) {
      var table = document.getElementById(tableId);
      var selected = [];
      if (!table) return selected;
      table.querySelectorAll('tbody tr').forEach(function(r) {
        var sel = r.querySelector('td select');
        if (sel && sel.value) selected.push(sel.value);
      });
      return selected;
    }

    function getEmployeesForRoleGroup(roleLabel) {
      var roles = (roleLabel || '').split(/\s*\/\s*/).map(function(s) { return s.trim(); }).filter(Boolean);
      var employees = [];
      roles.forEach(function(r) {
        (roleEmployees[r] || []).forEach(function(emp) {
          if (employees.indexOf(emp) === -1) employees.push(emp);
        });
      });
      return employees;
    }

    function addDetailRow(tableId, triggerEl) {
      var currentRow = triggerEl.closest('tr');
      var role = getRoleFromRow(currentRow);
      if (!role) return;
      var allEmployees = getEmployeesForRoleGroup(role);
      var selectedEmployees = getSelectedEmployeesInRole(tableId, role);
      var available = allEmployees.filter(function(e) { return selectedEmployees.indexOf(e) === -1; });
      if (available.length === 0) { showNotification('该角色下所有员工已被分配，无可选员工', 'warning'); return; }
      var options = available.map(function(e) { return '<option>' + e + '</option>'; }).join('');
      var lastRow = getLastRowOfRole(tableId, role);
      var newRow = document.createElement('tr');
      newRow.innerHTML =
        '<td><select class="form-control" style="width:140px;height:28px;font-size:13px">' + options + '</select></td>' +
        '<td class="input-cell"><input type="number" value="0"> %</td><td>$0.00</td>' +
        '<td class="action-cell"><a href="javascript:void(0)" onclick="addDetailRow(\'' + tableId + '\',this)">新增行</a>' +
        '<a href="javascript:void(0)" class="danger" onclick="removeDetailRow(\'' + tableId + '\',this)">删除行</a></td>';
      lastRow.after(newRow);
      recalcRoleAmount(tableId);
      showNotification('已在 ' + role + ' 角色组新增员工行');
    }

    function removeDetailRow(tableId, triggerEl) {
      var row = triggerEl.closest('tr');
      var table = document.getElementById(tableId);
      if (!table) return;
      var n = table.querySelectorAll('tbody tr').length;
      if (n <= 1) { showNotification('每个角色至少需要保留一名员工', 'warning'); return; }
      row.style.opacity = '0';
      row.style.transition = 'opacity 0.2s';
      setTimeout(function() {
        row.remove();
        recalcRoleAmount(tableId);
      }, 200);
      showNotification('已删除员工行');
    }

    function recalcRoleAmount(tableId) {
      var table = document.getElementById(tableId);
      var card = table ? table.closest('.detail-card') : null;
      if (!card || !table) return;
      if (card.getAttribute('data-order-tip-mode') === '1') return;
      recalcDetailLegacyCard(card);
    }

    function saveDetail() {
      showNotification('保存成功', 'success');
    }

    function saveAndNext() {
      var dateInput = document.getElementById('detailDate');
      var cur = new Date(dateInput.value + 'T00:00:00');
      cur.setDate(cur.getDate() + 1);
      var nextKey = cur.getFullYear() + '-' + pad(cur.getMonth() + 1) + '-' + pad(cur.getDate());
      dateInput.value = nextKey;
      renderDetailPage();
      showNotification('已保存，已跳转到 ' + nextKey, 'success');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function initStoreSelect() {
      var sel = document.getElementById('storeSelect');
      if (!sel) return;
      var rules = window.ruleData && ruleData.getRules ? ruleData.getRules() : [];
      var seen = {};
      var stores = [];
      rules.forEach(function(r) {
        var s = (r.store || '').trim();
        if (s && !seen[s]) { seen[s] = 1; stores.push(s); }
      });
      sel.innerHTML = '<option value="">请选择门店</option>' + stores.map(function(s) {
        return '<option value="' + s + '">' + s + '</option>';
      }).join('');
      if (stores.length > 0 && !sel.value) sel.value = stores[0];
    }

    function applyUrlParams() {
      var params = {};
      (location.search || '').slice(1).split('&').forEach(function(p) {
        var kv = p.split('=');
        if (kv[0] && kv[1]) params[kv[0]] = decodeURIComponent(kv[1]);
      });
      if (params.date) {
        var dateInp = document.getElementById('detailDate');
        if (dateInp) dateInp.value = params.date;
      }
      if (params.store) {
        var storeSel = document.getElementById('storeSelect');
        if (storeSel) storeSel.value = params.store;
      }
    }

    initStoreSelect();
    applyUrlParams();
    renderDetailPage();
  </script>
</body>
</html>
